                  <th className="py-2 px-4 text-left">City</th>
                  <th className="py-2 px-4 text-center w-24">Actions</th>
                </tr>
              </thead>
              <tbody>
                {sources.map(source => (
                  <tr key={source._id} className="border-b hover:bg-gray-50">
                    {editingId === source._id ? (
                      <>
                        <td className="py-2 px-4"><input type="text" value={editForm.name} onChange={(e) => setEditForm({ ...editForm, name: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-4">
                          <select value={editForm.type} onChange={(e) => setEditForm({ ...editForm, type: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                            <option value="Quarry">Quarry</option>
                            <option value="Sand & Gravel Pit">Sand & Gravel Pit</option>
                            <option value="Recycling Facility">Recycling Facility</option>
                            <option value="Dump Site">Dump Site</option>
                          </select>
                        </td>
                        <td className="py-2 px-4"><input type="text" value={editForm.address || ''} onChange={(e) => setEditForm({ ...editForm, address: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-4"><input type="text" value={editForm.city || ''} onChange={(e) => setEditForm({ ...editForm, city: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-4 text-center">
                          <button onClick={saveEdit} className="p-1 text-green-600 hover:text-green-700 mr-1"><Icons.Check /></button>
                          <button onClick={() => setEditingId(null)} className="p-1 text-red-500 hover:text-red-600"><Icons.X /></button>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="py-2 px-4 font-medium">{source.name}</td>
                        <td className="py-2 px-4"><span className="px-2 py-0.5 bg-gray-100 rounded text-xs">{source.type}</span></td>
                        <td className="py-2 px-4 text-gray-600">{source.address}</td>
                        <td className="py-2 px-4">{source.city}</td>
                        <td className="py-2 px-4 text-center">
                          <button onClick={() => startEdit(source)} className="p-1 text-tc-orange hover:text-orange-600"><Icons.Edit /></button>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================
    // PRICING MATRIX MANAGER
    // ============================================
    const PricingMatrixManager = ({ materials, sources, onUpdateMaterial, onAddMaterial }) => {
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [showAddForm, setShowAddForm] = useState(false);
      const [newMaterial, setNewMaterial] = useState({ materialName: '', sourceLocationId: '', materialType: 'aggregate', unit: 'Tons', basePrice: '' });
      const [filterSource, setFilterSource] = useState('all');

      const getSourceName = (id) => sources.find(s => s._id === id)?.name || 'Unknown';

      const filteredMaterials = filterSource === 'all' ? materials : materials.filter(m => m.sourceLocationId === filterSource);

      const startEdit = (mat) => {
        setEditingId(mat._id);
        setEditForm({ ...mat });
      };

      const saveEdit = () => {
        onUpdateMaterial({ ...editForm, basePrice: parseFloat(editForm.basePrice) || 0 });
        setEditingId(null);
      };

      const handleAddMaterial = () => {
        if (!newMaterial.materialName || !newMaterial.sourceLocationId) { alert('Material name and source are required'); return; }
        onAddMaterial({
          _id: Date.now().toString(),
          ...newMaterial,
          basePrice: parseFloat(newMaterial.basePrice) || 0,
          active: true
        });
        setNewMaterial({ materialName: '', sourceLocationId: '', materialType: 'aggregate', unit: 'Tons', basePrice: '' });
        setShowAddForm(false);
      };

      return (
        <div className="bg-white rounded-lg shadow">
          <div className="p-4 border-b flex flex-wrap gap-3 justify-between items-center">
            <h3 className="font-semibold text-tc-blue flex items-center gap-2"><Icons.Package /> Pricing Matrix ({materials.length} materials)</h3>
            <div className="flex gap-2">
              <select value={filterSource} onChange={(e) => setFilterSource(e.target.value)} className="border rounded px-3 py-1.5 text-sm">
                <option value="all">All Sources</option>
                {sources.map(s => <option key={s._id} value={s._id}>{s.name}</option>)}
              </select>
              <button onClick={() => setShowAddForm(true)} className="flex items-center gap-1 px-3 py-1.5 bg-tc-orange text-white rounded text-sm hover:bg-orange-600">
                <Icons.Plus /> Add Material
              </button>
            </div>
          </div>

          {showAddForm && (
            <div className="p-4 bg-green-50 border-b">
              <h4 className="font-medium mb-3">Add New Material</h4>
              <div className="grid grid-cols-1 md:grid-cols-6 gap-3">
                <input type="text" value={newMaterial.materialName} onChange={(e) => setNewMaterial({ ...newMaterial, materialName: e.target.value })} placeholder="Material Name *" className="border rounded px-3 py-2 text-sm md:col-span-2" />
                <select value={newMaterial.sourceLocationId} onChange={(e) => setNewMaterial({ ...newMaterial, sourceLocationId: e.target.value })} className="border rounded px-3 py-2 text-sm">
                  <option value="">Select Source *</option>
                  {sources.map(s => <option key={s._id} value={s._id}>{s.name}</option>)}
                </select>
                <select value={newMaterial.materialType} onChange={(e) => setNewMaterial({ ...newMaterial, materialType: e.target.value })} className="border rounded px-3 py-2 text-sm">
                  <option value="aggregate">Aggregate</option>
                  <option value="base">Base</option>
                  <option value="sand">Sand</option>
                  <option value="soil">Soil</option>
                  <option value="haul_off">Haul Off</option>
                </select>
                <select value={newMaterial.unit} onChange={(e) => setNewMaterial({ ...newMaterial, unit: e.target.value })} className="border rounded px-3 py-2 text-sm">
                  <option value="Tons">Tons</option>
                  <option value="CY">CY</option>
                </select>
                <input type="number" value={newMaterial.basePrice} onChange={(e) => setNewMaterial({ ...newMaterial, basePrice: e.target.value })} placeholder="Price" className="border rounded px-3 py-2 text-sm" step="0.01" />
              </div>
              <div className="flex gap-2 mt-3">
                <button onClick={() => setShowAddForm(false)} className="px-4 py-1.5 border rounded text-sm hover:bg-white">Cancel</button>
                <button onClick={handleAddMaterial} className="px-4 py-1.5 bg-green-600 text-white rounded text-sm hover:bg-green-700">Save Material</button>
              </div>
            </div>
          )}

          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-tc-blue text-white">
                <tr>
                  <th className="py-2 px-4 text-left">Material</th>
                  <th className="py-2 px-4 text-left">Source</th>
                  <th className="py-2 px-4 text-center">Type</th>
                  <th className="py-2 px-4 text-center">Unit</th>
                  <th className="py-2 px-4 text-right">Base Price</th>
                  <th className="py-2 px-4 text-center w-24">Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredMaterials.filter(m => m.active).map(mat => (
                  <tr key={mat._id} className="border-b hover:bg-gray-50">
                    {editingId === mat._id ? (
                      <>
                        <td className="py-2 px-4"><input type="text" value={editForm.materialName} onChange={(e) => setEditForm({ ...editForm, materialName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-4">
                          <select value={editForm.sourceLocationId} onChange={(e) => setEditForm({ ...editForm, sourceLocationId: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                            {sources.map(s => <option key={s._id} value={s._id}>{s.name}</option>)}
                          </select>
                        </td>
                        <td className="py-2 px-4">
                          <select value={editForm.materialType} onChange={(e) => setEditForm({ ...editForm, materialType: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                            <option value="aggregate">aggregate</option>
                            <option value="base">base</option>
                            <option value="sand">sand</option>
                            <option value="soil">soil</option>
                            <option value="haul_off">haul_off</option>
                          </select>
                        </td>
                        <td className="py-2 px-4">
                          <select value={editForm.unit} onChange={(e) => setEditForm({ ...editForm, unit: e.target.value })} className="w-full border rounded px-2 py-1 text-sm">
                            <option value="Tons">Tons</option>
                            <option value="CY">CY</option>
                          </select>
                        </td>
                        <td className="py-2 px-4"><input type="number" value={editForm.basePrice} onChange={(e) => setEditForm({ ...editForm, basePrice: e.target.value })} className="w-full border rounded px-2 py-1 text-sm text-right" step="0.01" /></td>
                        <td className="py-2 px-4 text-center">
                          <button onClick={saveEdit} className="p-1 text-green-600 hover:text-green-700 mr-1"><Icons.Check /></button>
                          <button onClick={() => setEditingId(null)} className="p-1 text-red-500 hover:text-red-600"><Icons.X /></button>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="py-2 px-4 font-medium">{mat.materialName}</td>
                        <td className="py-2 px-4 text-gray-600">{getSourceName(mat.sourceLocationId)}</td>
                        <td className="py-2 px-4 text-center"><span className="px-2 py-0.5 bg-gray-100 rounded text-xs">{mat.materialType}</span></td>
                        <td className="py-2 px-4 text-center">{mat.unit}</td>
                        <td className="py-2 px-4 text-right font-medium">{formatCurrency(mat.basePrice)}</td>
                        <td className="py-2 px-4 text-center">
                          <button onClick={() => startEdit(mat)} className="p-1 text-tc-orange hover:text-orange-600"><Icons.Edit /></button>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================
    // LINE ITEM ROW
    // ============================================
    const LineItemRow = ({ item, index, onUpdate, onRemove }) => {
      const [showCalc, setShowCalc] = useState(false);

      // Central calc: priceEach = (materialBasePrice + haulPerUnit) * (1 + markupPct/100)
      const calcPriceEach = (base, haul, markup) => {
        const cost = (base || 0) + (haul || 0);
        return cost * (1 + (markup || 0) / 100);
      };

      const handleDescChange = (e) => {
        onUpdate(index, { ...item, description: e.target.value });
      };

      const handleQtyChange = (e) => {
        const qty = parseFloat(e.target.value) || 0;
        onUpdate(index, { ...item, quantity: qty, priceTotal: qty * (item.priceEach || 0) });
      };

      const handleUnitChange = (e) => {
        onUpdate(index, { ...item, unit: e.target.value });
      };

      const handlePriceChange = (e) => {
        const base = parseFloat(e.target.value) || 0;
        const newPriceEach = calcPriceEach(base, item.haulPerUnit, item.markupPct);
        onUpdate(index, { ...item, materialBasePrice: base, priceEach: newPriceEach, priceTotal: item.quantity * newPriceEach });
      };

      const handleMarkupChange = (e) => {
        const markup = parseFloat(e.target.value) || 0;
        const base = item.materialBasePrice !== undefined ? item.materialBasePrice : 0;
        const newPriceEach = calcPriceEach(base, item.haulPerUnit, markup);
        onUpdate(index, { ...item, markupPct: markup, priceEach: newPriceEach, priceTotal: item.quantity * newPriceEach });
      };

      const handleHaulApply = ({ costPerUnit, unit: haulUnit }) => {
        const base = item.materialBasePrice !== undefined ? item.materialBasePrice : (item.priceEach || 0);
        const newPriceEach = calcPriceEach(base, costPerUnit, item.markupPct);
        onUpdate(index, { ...item, materialBasePrice: base, haulPerUnit: costPerUnit, haulUnit, priceEach: newPriceEach, priceTotal: item.quantity * newPriceEach });
        setShowCalc(false);
      };

      const handleHaulRemove = () => {
        const base = item.materialBasePrice !== undefined ? item.materialBasePrice : (item.priceEach || 0);
        const newPriceEach = calcPriceEach(base, 0, item.markupPct);
        onUpdate(index, { ...item, haulPerUnit: 0, haulUnit: null, priceEach: newPriceEach, priceTotal: item.quantity * newPriceEach });
      };

      const hasHaul = item.haulPerUnit && item.haulPerUnit > 0;
      const base = item.materialBasePrice !== undefined ? item.materialBasePrice : 0;
      const cost = base + (item.haulPerUnit || 0);
      const markup = item.markupPct || 0;
      const quotedPrice = item.priceEach || 0;

      return (
        <div className="line-item-card">
          <div className="line-item-card-header">
            <span className="line-item-num">Item {index + 1}</span>
            <div className="flex items-center gap-3">
              <span className="line-item-total-display">{formatCurrency(item.priceTotal || 0)}</span>
              <button onClick={() => onRemove(index)} className="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50"><Icons.Trash /></button>
            </div>
          </div>

          {/* Row 1: Description */}
          <div style={{marginBottom:'12px'}}>
            <label className="field-label">Description / Line Item Name</label>
            <input type="text" value={item.description} onChange={handleDescChange} className="field-input" placeholder="e.g. 1&quot; Clean Limestone" />
          </div>

          {/* Row 2: Qty / Unit / Mat Cost / Markup */}
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1.8fr 1fr', gap:'12px', alignItems:'start'}}>
            {/* Quantity */}
            <div>
              <label className="field-label">Quantity</label>
              <input type="number" value={item.quantity || ''} onChange={handleQtyChange} className="field-input" placeholder="0" />
            </div>

            {/* Unit */}
            <div>
              <label className="field-label">Unit</label>
              <select value={item.unit} onChange={handleUnitChange} className="field-input">
                <option value="Tons">Tons</option>
                <option value="CY">CY</option>
                <option value="LS">LS</option>
                <option value="EA">EA</option>
              </select>
            </div>

            {/* Material Cost per unit */}
            <div>
              <label className="field-label">Material Cost / Unit ($)</label>
              <input type="number" value={base || ''} onChange={handlePriceChange} className="field-input" placeholder="0.00" step="0.01" />
            </div>

            {/* Markup % */}
            <div>
              <label className="field-label">Markup (%)</label>
              <input type="number" value={markup || ''} onChange={handleMarkupChange} className="field-input" placeholder="0" step="0.5" min="0" />
            </div>
          </div>

          {/* Haul + pricing summary row */}
          <div style={{marginTop:'12px', display:'flex', alignItems:'center', gap:'10px', flexWrap:'wrap', justifyContent:'space-between'}}>
            {/* Haul Rate button / badge */}
            <div style={{display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap'}}>
              {hasHaul ? (
                <>
                  <span style={{display:'inline-flex', alignItems:'center', gap:'6px', background:'#eff6ff', border:'1.5px solid #93c5fd', borderRadius:'8px', padding:'6px 12px', fontSize:'13px', fontWeight:700, color:'#1d4ed8'}}>
                    🚚 Haul: +{formatCurrency(item.haulPerUnit)}/{item.haulUnit || item.unit} included
                  </span>
                  <button onClick={() => setShowCalc(true)} style={{padding:'6px 12px', border:'1px solid #d1d5db', borderRadius:'8px', fontSize:'12px', fontWeight:600, color:'#374151', background:'#fff', cursor:'pointer'}}>Edit</button>
                  <button onClick={handleHaulRemove} style={{padding:'6px 10px', border:'1px solid #fca5a5', borderRadius:'8px', fontSize:'12px', fontWeight:600, color:'#dc2626', background:'#fff', cursor:'pointer'}}>✕ Remove</button>
                </>
              ) : (
                <button onClick={() => setShowCalc(true)} style={{display:'inline-flex', alignItems:'center', gap:'6px', padding:'8px 16px', border:'none', borderRadius:'8px', fontSize:'13px', fontWeight:700, color:'#fff', background:'#1e3a5f', cursor:'pointer'}}>
                  <Icons.Truck /> Add Haul Rate
                </button>
              )}
            </div>

            {/* Quoted price summary (visible when cost > 0) */}
            {cost > 0 && (
              <div style={{display:'flex', gap:'16px', alignItems:'center', fontSize:'12px', color:'#6b7280', background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:'8px', padding:'6px 14px'}}>
                <span>Cost: <strong style={{color:'#374151'}}>{formatCurrency(cost)}</strong></span>
                {markup > 0 && <span>Markup: <strong style={{color:'#f97316'}}>{markup}%</strong></span>}
                <span>Quoted: <strong style={{color:'#1e3a5f', fontSize:'13px'}}>{formatCurrency(quotedPrice)}</strong>/{item.unit}</span>
              </div>
            )}
          </div>

          {showCalc && <TruckRateCalculator isOpen={showCalc} onClose={() => setShowCalc(false)} onApply={handleHaulApply} />}
        </div>
      );
    };

    // ============================================
    // QUOTE PREVIEW - Combines bundled items for customer view
    // ============================================
    const QuotePreview = ({ quote, onClose, onSign, onSend, startSigning = false }) => {
      const [tcSignature, setTcSignature] = useState(quote.tcSignature || '');
      const [tcSignDate, setTcSignDate] = useState(quote.tcSignDate || '');
      const [customerSignature, setCustomerSignature] = useState(quote.customerSignature || '');
      const [customerSignDate, setCustomerSignDate] = useState(quote.customerSignDate || '');
      const [showSigningPanel, setShowSigningPanel] = useState(startSigning && !quote.tcSignature);
      const [isSigned, setIsSigned] = useState(!!(quote.tcSignature));

      if (!quote) return null;

      // Process line items to combine bundled ones
      const getDisplayLineItems = () => {
        const displayItems = [];
        
        for (let i = 0; i < quote.lineItems.length; i++) {
          const item = quote.lineItems[i];
          
          if (item.bundleWithPrevious && displayItems.length > 0) {
            // Add this item's unit price to the previous item
            const prevItem = displayItems[displayItems.length - 1];
            prevItem.priceEach = (prevItem.priceEach || 0) + (item.priceEach || 0);
            prevItem.priceTotal = prevItem.quantity * prevItem.priceEach;
          } else {
            // Add as new item (clone to avoid mutating original)
            displayItems.push({ ...item });
          }
        }
        
        return displayItems;
      };

      const displayItems = getDisplayLineItems();
      const displaySubtotal = displayItems.reduce((sum, item) => sum + (item.priceTotal || 0), 0);
      const hasBundledItems = quote.lineItems.some(item => item.bundleWithPrevious);

      const handleSignAndSave = () => {
        if (!tcSignature.trim()) {
          alert('Please type your name to sign');
          return;
        }
        const sigData = {
          tcSignature,
          tcSignDate: tcSignDate || new Date().toISOString().split('T')[0],
          customerSignature,
          customerSignDate
        };
        if (onSign) {
          onSign(sigData);
        }
        setIsSigned(true);
        setShowSigningPanel(false);
      };

      const handleSendQuote = () => {
        if (onSend) {
          onSend({
            tcSignature,
            tcSignDate: tcSignDate || new Date().toISOString().split('T')[0]
          });
        }
      };

      const today = new Date().toISOString().split('T')[0];

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
            <div className="bg-tc-blue text-white p-4 flex justify-between items-center no-print">
              <h3 className="font-bold">Quote Preview — {quote.quoteNumber} <span className="text-sm font-normal opacity-75">(Customer View)</span></h3>
              <div className="flex gap-2">
                <button onClick={() => window.print()} className="px-3 py-1.5 bg-white bg-opacity-20 text-white rounded hover:bg-opacity-30 flex items-center gap-1 text-sm">
                  <Icons.Printer /> Print
                </button>
                <button onClick={onClose} className="p-1 hover:text-gray-300"><Icons.X /></button>
              </div>
            </div>

            {/* Signing Panel — shown when startSigning or user clicks sign */}
            {onSign && !isSigned && (
              <div className="no-print" style={{background:'#f0fdf4', borderBottom:'3px solid #16a34a', padding:'20px 24px'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px'}}>
                  <h4 style={{margin:0, fontSize:'15px', fontWeight:800, color:'#15803d'}}>Sign Quote</h4>
                  <p style={{margin:0, fontSize:'12px', color:'#4b7280'}}>Your signature will appear on the quote sent to the customer.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label className="field-label" style={{color:'#166534'}}>T&C Materials Signature</label>
                    <input type="text" value={tcSignature} onChange={(e) => setTcSignature(e.target.value)} placeholder="Type your full name to sign" className="field-input" style={{fontStyle:'italic', fontFamily:'cursive', fontSize:'1.05rem'}} />
                  </div>
                  <div>
                    <label className="field-label" style={{color:'#166534'}}>Date</label>
                    <input type="date" value={tcSignDate || today} onChange={(e) => setTcSignDate(e.target.value)} className="field-input" />
                  </div>
                  <div style={{display:'flex', alignItems:'flex-end'}}>
                    <button onClick={handleSignAndSave} style={{width:'100%', minHeight:'48px', background:'#16a34a', color:'#fff', border:'none', borderRadius:'10px', fontWeight:800, fontSize:'1rem', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px'}}>
                      <Icons.Check /> Apply Signature
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Signed confirmation banner + big Send button */}
            {isSigned && (
              <div className="no-print" style={{background:'#dcfce7', borderBottom:'3px solid #16a34a', padding:'14px 24px', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'12px'}}>
                <div>
                  <span style={{fontWeight:800, color:'#15803d', fontSize:'14px'}}>✓ Signed by {tcSignature}</span>
                  <span style={{color:'#4b7280', fontSize:'13px', marginLeft:'8px'}}>on {tcSignDate || today}</span>
                </div>
                {onSend && (
                  <button onClick={handleSendQuote} style={{minHeight:'48px', padding:'0 28px', background:'#f97316', color:'#fff', border:'none', borderRadius:'10px', fontWeight:800, fontSize:'1rem', cursor:'pointer', display:'flex', alignItems:'center', gap:'8px'}}>
                    <Icons.Send /> Save &amp; Send Quote
                  </button>
                )}
              </div>
            )}

            <div className="flex-1 overflow-y-auto p-6 quote-preview text-sm">
              {hasBundledItems && (
                <div className="bg-orange-50 border border-orange-200 rounded p-3 mb-4 text-xs text-orange-800 no-print">
                  <strong>✓ Bundled Pricing Applied</strong>
                  <p className="mt-1">Transportation costs have been added to material unit prices. Customer sees single delivered price per unit.</p>
                </div>
              )}
              <div className="text-center mb-4">
                <img src="/tc-logo-dark.png" alt="T&C Materials, LLC" className="h-16 mx-auto mb-2" />
                <p className="font-bold text-lg">QUOTATION</p>
              </div>
              <div className="border text-xs mb-4">
                <div className="grid grid-cols-2">
                  <div className="border-r border-b p-2"><strong>Bid Date:</strong> {formatDate(quote.bidDate)}</div>
                  <div className="border-b p-2"><strong>Quote #:</strong> {quote.quoteNumber}{quote.revisionNumber > 0 ? `(R${quote.revisionNumber})` : ''}</div>
                  <div className="border-r border-b p-2"><strong>Customer:</strong> {quote.customerSnapshot?.companyName}</div>
                  <div className="border-b p-2"><strong>Sales Rep:</strong> {quote.salesRepSnapshot?.name}</div>
                  <div className="border-r border-b p-2"><strong>Attn:</strong> {quote.customerSnapshot?.contactName}</div>
                  <div className="border-b p-2"><strong>Email:</strong> {quote.salesRepSnapshot?.email}</div>
                  <div className="border-r border-b p-2"><strong>Expiration:</strong> {formatDate(quote.expirationDate)}</div>
                  <div className="border-b p-2"><strong>Delivery:</strong> {quote.deliveryMethod}</div>
                  <div className="border-r p-2"><strong>Project:</strong> {quote.projectName}</div>
                  <div className="p-2"><strong>Terms:</strong> {quote.paymentTerms}</div>
                </div>
              </div>
              <table className="w-full border text-xs mb-4">
                <thead className="bg-gray-100">
                  <tr><th className="border p-1.5 text-left">Item</th><th className="border p-1.5 w-16">QTY</th><th className="border p-1.5 w-14">Unit</th><th className="border p-1.5 w-24 text-right">Price Each</th><th className="border p-1.5 w-28 text-right">Total</th></tr>
                </thead>
                <tbody>
                  {displayItems.map((item, idx) => (
                    <tr key={idx}><td className="border p-1.5">{item.description}</td><td className="border p-1.5 text-center">{item.quantity?.toLocaleString()}</td><td className="border p-1.5 text-center">{item.unit}</td><td className="border p-1.5 text-right">{formatCurrency(item.priceEach)}</td><td className="border p-1.5 text-right">{formatCurrency(item.priceTotal)}</td></tr>
                  ))}
                  <tr className="bg-gray-100 font-bold"><td colSpan="4" className="border p-1.5 text-right">SUBTOTAL:</td><td className="border p-1.5 text-right">{formatCurrency(displaySubtotal)}</td></tr>
                </tbody>
              </table>
              {quote.scopeOfWork && <div className="mb-4"><p className="font-bold text-xs">Scope of Work:</p><p className="text-xs whitespace-pre-wrap">{quote.scopeOfWork}</p></div>}
              <div className="text-xs"><p className="font-bold mb-1">TERMS AND CONDITIONS</p><p className="text-[10px]">{TERMS_CONDITIONS}</p><p className="text-[10px] font-bold mt-2">{TAX_DISCLAIMER}</p></div>
              
              {/* Signature Section */}
              <div className="grid grid-cols-2 gap-8 mt-6 text-xs border-t pt-4">
                <div>
                  <p className="font-bold mb-2">Customer Acceptance:</p>
                  <div className="border-b border-gray-400 h-8 mb-1 flex items-end">
                    {(customerSignature || quote.customerSignature) && (
                      <span className="italic text-lg" style={{fontFamily: 'cursive'}}>{customerSignature || quote.customerSignature}</span>
                    )}
                  </div>
                  <p className="text-gray-500">Signature</p>
                  <div className="border-b border-gray-400 h-6 mt-3 mb-1 flex items-end">
                    <span>{customerSignDate || quote.customerSignDate || ''}</span>
                  </div>
                  <p className="text-gray-500">Date</p>
                </div>
                <div>
                  <p className="font-bold mb-2">T&C Materials, LLC:</p>
                  <div className="border-b border-gray-400 h-8 mb-1 flex items-end">
                    {(tcSignature || quote.tcSignature) && (
                      <span className="italic text-lg" style={{fontFamily: 'cursive'}}>{tcSignature || quote.tcSignature}</span>
                    )}
                  </div>
                  <p className="text-gray-500">Signature</p>
                  <div className="border-b border-gray-400 h-6 mt-3 mb-1 flex items-end">
                    <span>{tcSignDate || quote.tcSignDate || ''}</span>
                  </div>
                  <p className="text-gray-500">Date</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // QUOTE FORM
    // ============================================
    const QuoteForm = ({ quote, customers, currentUser, onSave, onCancel, onAddCustomer }) => {
      const today = new Date().toISOString().split('T')[0];
      const thirtyDays = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
      
      const [formData, setFormData] = useState({
        quoteNumber: quote?.quoteNumber || generateQuoteNumber(),
        revisionNumber: quote?.revisionNumber || 0,
        status: quote?.status || 'draft',
        bidDate: quote?.bidDate || today,
        expirationDate: quote?.expirationDate || thirtyDays,
        customerId: quote?.customerId || '',
        customerSnapshot: quote?.customerSnapshot || null,
        projectName: quote?.projectName || '',
        projectAddress: quote?.projectAddress || '',
        deliveryMethod: quote?.deliveryMethod || 'End Dumps',
        taxExemptStatus: quote?.taxExemptStatus || 'TBD',
        paymentTerms: quote?.paymentTerms || 'Net 30',
        lineItems: quote?.lineItems || [],
        scopeOfWork: quote?.scopeOfWork || '',
        salesRepSnapshot: quote?.salesRepSnapshot || { name: currentUser.name, phone: currentUser.phone, email: currentUser.email }
      });

      const [selectedCustomer, setSelectedCustomer] = useState(quote?.customerId ? customers.find(c => c._id === quote.customerId) : null);
      const [showPreview, setShowPreview] = useState(false);
      const [previewStartSigning, setPreviewStartSigning] = useState(false);


      const handleCustomerSelect = (customer) => {
        setSelectedCustomer(customer);
        const contact = customer.contacts.find(c => c.isPrimary) || customer.contacts[0];
        setFormData({
          ...formData,
          customerId: customer._id,
          customerSnapshot: { companyName: customer.companyName, shortName: customer.shortName, contactName: contact?.name || '', contactEmail: contact?.email || '', contactPhone: contact?.phone || '', address: customer.address || '' },
          paymentTerms: customer.paymentTerms || 'Net 30'
        });
      };

      const addLineItem = () => setFormData({ ...formData, lineItems: [...formData.lineItems, { itemNumber: formData.lineItems.length + 1, description: '', quantity: 0, unit: 'Tons', materialBasePrice: 0, haulPerUnit: 0, haulUnit: null, markupPct: 0, priceEach: 0, priceTotal: 0 }] });
      const updateLineItem = (idx, item) => { const items = [...formData.lineItems]; items[idx] = { ...item, itemNumber: idx + 1 }; setFormData({ ...formData, lineItems: items }); };
      const removeLineItem = (idx) => setFormData({ ...formData, lineItems: formData.lineItems.filter((_, i) => i !== idx).map((item, i) => ({ ...item, itemNumber: i + 1 })) });
      const subtotal = formData.lineItems.reduce((sum, item) => sum + (item.priceTotal || 0), 0);

      const handleSave = (send = false) => {
        if (!selectedCustomer) { alert('Please select a customer'); return; }
        if (!formData.projectName) { alert('Please enter a project name'); return; }
        if (formData.lineItems.length === 0) { alert('Please add at least one line item'); return; }
        onSave({ ...formData, subtotal, status: send ? 'sent' : 'draft' }, send);
      };

      return (
        <div className="max-w-4xl mx-auto">
          {/* Header bar */}
          <div className="bg-white rounded-xl shadow-sm px-6 py-4 mb-5" style={{display:'flex', flexWrap:'wrap', gap:'12px', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <h2 className="text-xl font-extrabold text-tc-blue">{quote?._id ? 'Edit Quote' : 'New Quote'} <span className="text-tc-orange">#{formData.quoteNumber}</span>{formData.revisionNumber > 0 && <span className="text-tc-orange ml-2 text-sm">(Rev {formData.revisionNumber})</span>}</h2>
              <p className="text-sm text-gray-500 mt-0.5">Fill in each section below, then Save Draft or Review &amp; Sign to send.</p>
            </div>
            <div style={{display:'flex', gap:'10px', flex:'1 1 auto', justifyContent:'flex-end'}}>
              <button onClick={() => { setPreviewStartSigning(false); setShowPreview(true); }} style={{flex:'1 1 0', minWidth:'120px', maxWidth:'180px', minHeight:'52px', fontSize:'1rem', fontWeight:'700', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', border:'2px solid #d1d5db', borderRadius:'10px', background:'#fff', color:'#374151', cursor:'pointer'}}><Icons.Eye /> Preview</button>
            </div>
          </div>

          {/* Section 1: Quote Details */}
          <div className="form-section">
            <div className="form-section-title">Quote Details</div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div><label className="field-label">Bid Date</label><input type="date" value={formData.bidDate} onChange={(e) => setFormData({ ...formData, bidDate: e.target.value })} className="field-input" /></div>
              <div><label className="field-label">Expiration Date</label><input type="date" value={formData.expirationDate} onChange={(e) => setFormData({ ...formData, expirationDate: e.target.value })} className="field-input" /></div>
              <div><label className="field-label">Delivery Method</label>
                <select value={formData.deliveryMethod} onChange={(e) => setFormData({ ...formData, deliveryMethod: e.target.value })} className="field-input">
                  <option>End Dumps</option><option>Tandem</option><option>Flatbed</option><option>Customer Pickup</option>
                </select>
              </div>
              <div><label className="field-label">Tax Exempt</label>
                <select value={formData.taxExemptStatus} onChange={(e) => setFormData({ ...formData, taxExemptStatus: e.target.value })} className="field-input">
                  <option value="TBD">TBD</option><option value="Yes">Yes</option><option value="No">No</option>
                </select>
              </div>
            </div>
          </div>

          {/* Section 2: Customer & Project */}
          <div className="form-section">
            <div className="form-section-title">Customer &amp; Project</div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <CustomerSelect customers={customers} selectedCustomer={selectedCustomer} onSelect={handleCustomerSelect} onAddCustomer={onAddCustomer} />
              <div><label className="field-label">Project Name *</label><input type="text" value={formData.projectName} onChange={(e) => setFormData({ ...formData, projectName: e.target.value })} className="field-input" placeholder="Enter project name" /></div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div><label className="field-label">Attention</label><input type="text" value={formData.customerSnapshot?.contactName || ''} onChange={(e) => setFormData({ ...formData, customerSnapshot: { ...formData.customerSnapshot, contactName: e.target.value } })} className="field-input" placeholder="Contact name" /></div>
              <div><label className="field-label">Project Address</label><input type="text" value={formData.projectAddress} onChange={(e) => setFormData({ ...formData, projectAddress: e.target.value })} className="field-input" placeholder="Job site address" /></div>
              <div><label className="field-label">Payment Terms</label>
                <select value={formData.paymentTerms} onChange={(e) => setFormData({ ...formData, paymentTerms: e.target.value })} className="field-input">
                  <option>Net 30</option><option>Net 15</option><option>Net 45</option><option>COD</option><option>Due on Receipt</option>
                </select>
              </div>
            </div>
          </div>

          {/* Section 3: Line Items */}
          <div className="form-section">
            <div className="flex justify-between items-center mb-4" style={{borderBottom:'2px solid #e2e8f0', paddingBottom:'10px'}}>
              <span className="form-section-title" style={{margin:0, border:0, padding:0}}>Line Items</span>
              <button onClick={addLineItem} className="flex items-center gap-2 px-4 py-2 bg-tc-orange text-white rounded-lg font-semibold text-sm hover:bg-orange-600"><Icons.Plus /> Add Material</button>
            </div>

            {formData.lineItems.length === 0 && (
              <div className="text-center py-10 text-gray-400">
                <div className="text-4xl mb-3">📦</div>
                <p className="font-semibold text-gray-500">No materials added yet</p>
                <p className="text-sm mt-1">Click "Add Material" to start building your quote.</p>
              </div>
            )}

            {formData.lineItems.map((item, idx) => <LineItemRow key={idx} item={item} index={idx} onUpdate={updateLineItem} onRemove={removeLineItem} />)}

            {formData.lineItems.length > 0 && (
              <div className="flex justify-end mt-4 pt-4 border-t-2 border-gray-200">
                <div className="text-right">
                  <span className="text-sm font-semibold text-gray-500 uppercase tracking-wide">Quote Subtotal</span>
                  <div className="text-3xl font-extrabold text-tc-blue mt-1">{formatCurrency(subtotal)}</div>
                </div>
              </div>
            )}
          </div>

          {/* Section 4: Scope of Work */}
          <div className="form-section">
            <div className="form-section-title">Scope of Work</div>
            <textarea value={formData.scopeOfWork} onChange={(e) => setFormData({ ...formData, scopeOfWork: e.target.value })} className="field-input" style={{height:'96px', resize:'vertical'}} placeholder="Describe the scope, special conditions, or notes for this quote..." />
          </div>

          {/* Action buttons */}
          <div className="bg-white rounded-xl shadow-sm px-6 py-4 flex justify-between items-center">
            <button onClick={onCancel} className="px-5 py-2.5 border-2 border-gray-300 rounded-lg font-semibold text-gray-600 hover:bg-gray-50">Cancel</button>
            <div className="flex gap-3">
              <button onClick={() => handleSave(false)} className="flex items-center gap-2 px-5 py-2.5 bg-gray-700 text-white rounded-lg font-semibold hover:bg-gray-800"><Icons.Save /> Save Draft</button>
              <button onClick={() => { setPreviewStartSigning(true); setShowPreview(true); }} className="flex items-center gap-2 px-6 py-2.5 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700"><Icons.Edit /> Review &amp; Sign</button>
            </div>
          </div>

          {showPreview && <QuotePreview quote={{ ...formData, subtotal }} startSigning={previewStartSigning} onClose={() => { setShowPreview(false); setPreviewStartSigning(false); }} onSign={(sigData) => setFormData({ ...formData, ...sigData })} onSend={(sigData) => { setFormData({ ...formData, ...sigData }); handleSave(true); }} />}
        </div>
      );
    };

    // ============================================
    // QUOTE LOG
    // ============================================
    const QuoteLog = ({ quotes, onEdit, onRevise, onNew }) => {
      const [search, setSearch] = useState('');
      const [previewQuote, setPreviewQuote] = useState(null);

      const filtered = quotes.filter(q => 
        q.quoteNumber.toLowerCase().includes(search.toLowerCase()) || 
        q.projectName.toLowerCase().includes(search.toLowerCase()) || 
        q.customerSnapshot?.companyName?.toLowerCase().includes(search.toLowerCase())
      ).sort((a, b) => new Date(b.createdAt || b.bidDate) - new Date(a.createdAt || a.bidDate));

      const statusBadge = (s) => {
        const styles = { draft: 'bg-gray-100 text-gray-700', sent: 'bg-blue-100 text-blue-700', accepted: 'bg-green-100 text-green-700' };
        return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${styles[s] || styles.draft}`}>{s}</span>;
      };

      const summaryStats = [
        { label: 'Total Quotes', value: quotes.length, color: '#1e3a5f' },
        { label: 'Drafts', value: quotes.filter(q => q.status === 'draft').length, color: '#6b7280' },
        { label: 'Sent', value: quotes.filter(q => q.status === 'sent').length, color: '#2563eb' },
        { label: 'Total Value', value: formatCurrency(quotes.reduce((s, q) => s + (q.subtotal || 0), 0)), color: '#f97316' },
      ];

      return (
        <div style={{maxWidth:'900px', margin:'0 auto'}}>

          {/* Summary bar */}
          <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'12px', marginBottom:'20px'}}>
            {summaryStats.map(s => (
              <div key={s.label} style={{background:'#fff', borderRadius:'12px', padding:'16px 20px', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', borderLeft:`4px solid ${s.color}`}}>
                <p style={{margin:'0 0 4px', fontSize:'11px', fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'#9ca3af'}}>{s.label}</p>
                <p style={{margin:0, fontSize:'22px', fontWeight:800, color:s.color}}>{s.value}</p>
              </div>
            ))}
          </div>

          {/* Search + New Quote */}
          <div style={{display:'flex', gap:'12px', marginBottom:'16px', flexWrap:'wrap'}}>
            <div style={{flex:'1', minWidth:'200px', position:'relative'}}>
              <span style={{position:'absolute', left:'12px', top:'50%', transform:'translateY(-50%)', color:'#9ca3af'}}><Icons.Search /></span>
              <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search by quote #, project, or customer..." className="field-input" style={{paddingLeft:'40px'}} />
            </div>
            <button onClick={onNew} style={{minHeight:'48px', padding:'0 24px', background:'#f97316', color:'#fff', border:'none', borderRadius:'10px', fontWeight:800, fontSize:'1rem', cursor:'pointer', display:'flex', alignItems:'center', gap:'8px', whiteSpace:'nowrap'}}>
              <Icons.Plus /> New Quote
            </button>
          </div>

          {/* Quote cards */}
          {filtered.length === 0 ? (
            <div style={{background:'#fff', borderRadius:'12px', padding:'60px 20px', textAlign:'center', color:'#9ca3af', boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
              <div style={{fontSize:'48px', marginBottom:'12px'}}>📄</div>
              <p style={{fontWeight:700, fontSize:'16px', color:'#6b7280', margin:'0 0 4px'}}>No quotes yet</p>
              <p style={{margin:0, fontSize:'13px'}}>Click "New Quote" to create your first one.</p>
            </div>
          ) : (
            <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
              {filtered.map(q => (
                <div key={q._id} style={{background:'#fff', borderRadius:'12px', padding:'20px 24px', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', border:'2px solid #f3f4f6', cursor:'pointer', transition:'border-color 0.15s'}}
                  onClick={() => setPreviewQuote(q)}
                  onMouseEnter={e => e.currentTarget.style.borderColor='#c7d2fe'}
                  onMouseLeave={e => e.currentTarget.style.borderColor='#f3f4f6'}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'12px'}}>
                    {/* Left: main info */}
                    <div style={{flex:'1', minWidth:'200px'}}>
                      <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'6px'}}>
                        <span style={{fontFamily:'monospace', fontWeight:800, fontSize:'15px', color:'#1e3a5f'}}>{q.quoteNumber}{q.revisionNumber > 0 && <span style={{color:'#f97316'}}> R{q.revisionNumber}</span>}</span>
                        {statusBadge(q.status)}
                        {q.tcSignature && <span style={{fontSize:'11px', fontWeight:700, color:'#16a34a', background:'#dcfce7', padding:'2px 8px', borderRadius:'20px'}}>✓ Signed</span>}
                      </div>
                      <p style={{margin:'0 0 2px', fontSize:'17px', fontWeight:700, color:'#111827'}}>{q.customerSnapshot?.companyName || q.customerSnapshot?.shortName || '—'}</p>
                      <p style={{margin:0, fontSize:'13px', color:'#6b7280'}}>{q.projectName}</p>
                    </div>
                    {/* Right: amount + date + actions */}
                    <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'8px'}}>
                      <p style={{margin:0, fontSize:'24px', fontWeight:900, color:'#1e3a5f'}}>{formatCurrency(q.subtotal)}</p>
                      <p style={{margin:0, fontSize:'12px', color:'#9ca3af'}}>{formatDate(q.bidDate)}</p>
                      <div style={{display:'flex', gap:'6px'}} onClick={e => e.stopPropagation()}>
                        <button onClick={() => setPreviewQuote(q)} style={{padding:'6px 12px', border:'1px solid #e5e7eb', borderRadius:'8px', background:'#fff', color:'#6b7280', cursor:'pointer', fontSize:'12px', fontWeight:600, display:'flex', alignItems:'center', gap:'4px'}}><Icons.Eye /> View</button>
                        <button onClick={() => onEdit(q)} style={{padding:'6px 12px', border:'1px solid #e5e7eb', borderRadius:'8px', background:'#fff', color:'#16a34a', cursor:'pointer', fontSize:'12px', fontWeight:600, display:'flex', alignItems:'center', gap:'4px'}}><Icons.Edit /> Edit</button>
                        <button onClick={() => onRevise(q)} style={{padding:'6px 12px', border:'1px solid #e5e7eb', borderRadius:'8px', background:'#fff', color:'#f97316', cursor:'pointer', fontSize:'12px', fontWeight:600, display:'flex', alignItems:'center', gap:'4px'}}><Icons.Copy /> Revise</button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {previewQuote && <QuotePreview quote={previewQuote} onClose={() => setPreviewQuote(null)} />}
        </div>
      );
    };

    // ============================================
    // CUSTOMERS PAGE
    // ============================================
    const CustomersPage = ({ customers, onUpdate }) => {
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});

      const startEdit = (c) => { setEditingId(c._id); setEditForm({ ...c, contactName: c.contacts[0]?.name || '', contactPhone: c.contacts[0]?.phone || '', contactEmail: c.contacts[0]?.email || '' }); };
      const saveEdit = () => {
        onUpdate({ ...editForm, contacts: [{ name: editForm.contactName, phone: editForm.contactPhone, email: editForm.contactEmail, isPrimary: true }] });
        setEditingId(null);
      };

      return (
        <div className="bg-white rounded-lg shadow">
          <div className="p-4 border-b"><h3 className="font-semibold text-tc-blue">Customer Database ({customers.length})</h3></div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-tc-blue text-white">
                <tr><th className="py-2 px-3 text-left">Short</th><th className="py-2 px-3 text-left">Company</th><th className="py-2 px-3 text-left">Address</th><th className="py-2 px-3 text-left">Contact</th><th className="py-2 px-3 text-left">Phone</th><th className="py-2 px-3 text-left">Email</th><th className="py-2 px-3 w-20">Actions</th></tr>
              </thead>
              <tbody>
                {customers.map(c => (
                  <tr key={c._id} className="border-b hover:bg-gray-50">
                    {editingId === c._id ? (
                      <>
                        <td className="py-2 px-3"><input type="text" value={editForm.shortName} onChange={(e) => setEditForm({ ...editForm, shortName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.companyName} onChange={(e) => setEditForm({ ...editForm, companyName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.address || ''} onChange={(e) => setEditForm({ ...editForm, address: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.contactName} onChange={(e) => setEditForm({ ...editForm, contactName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.contactPhone} onChange={(e) => setEditForm({ ...editForm, contactPhone: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.contactEmail} onChange={(e) => setEditForm({ ...editForm, contactEmail: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3 text-center">
                          <button onClick={saveEdit} className="p-1 text-green-600"><Icons.Check /></button>
                          <button onClick={() => setEditingId(null)} className="p-1 text-red-500"><Icons.X /></button>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="py-2 px-3 font-medium">{c.shortName}</td>
                        <td className="py-2 px-3">{c.companyName}</td>
                        <td className="py-2 px-3 text-xs text-gray-600">{c.address}</td>
                        <td className="py-2 px-3">{c.contacts[0]?.name}</td>
                        <td className="py-2 px-3 text-xs">{c.contacts[0]?.phone}</td>
                        <td className="py-2 px-3 text-xs">{c.contacts[0]?.email}</td>
                        <td className="py-2 px-3 text-center"><button onClick={() => startEdit(c)} className="p-1 text-tc-orange hover:text-orange-600"><Icons.Edit /></button></td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    const App = () => {
      const [data, setData] = useState(getInitialData);
      const [user, setUser] = useState(null);
      const [page, setPage] = useState('quotes');
      const [showForm, setShowForm] = useState(false);
      const [editQuote, setEditQuote] = useState(null);
      const [sidebar, setSidebar] = useState(window.innerWidth > 768);
      const [pinEntry, setPinEntry] = useState('');
      const [loginError, setLoginError] = useState('');
      const [loginLoading, setLoginLoading] = useState(false);
      const [syncStatus, setSyncStatus] = useState(''); // 'syncing' | 'synced' | 'offline' | ''
      const [showMigrationPrompt, setShowMigrationPrompt] = useState(false);
      const [pendingMigrationData, setPendingMigrationData] = useState(null);

      useEffect(() => { saveToStorage(data); }, [data]);

      const loadCloudData = async (localData) => {
        setSyncStatus('syncing');
        try {
          const [cloudQuotes, cloudCustomers] = await Promise.all([
            api.get('tcq-data?type=quotes'),
            api.get('tcq-data?type=customers')
          ]);

          if (cloudQuotes === null && cloudCustomers === null) {
            setSyncStatus('offline');
            return;
          }

          const quotes = cloudQuotes || [];
          const customers = cloudCustomers || [];

          // Check if we need to migrate existing localStorage data
          const alreadyMigrated = localStorage.getItem(MIGRATION_KEY);
          const hasLocalQuotes = localData.quotes && localData.quotes.length > 0;
          const hasLocalCustomers = localData.customers && localData.customers.filter(c => !['1','2'].includes(c._id)).length > 0;

          if (!alreadyMigrated && (hasLocalQuotes || hasLocalCustomers) && quotes.length === 0) {
            // Office computer with existing data that hasn't been synced yet
            setPendingMigrationData({ quotes: localData.quotes || [], customers: localData.customers || [] });
            setShowMigrationPrompt(true);
          }

          setData(prev => ({ ...prev, quotes, customers }));
          setSyncStatus('synced');
        } catch (e) {
          console.error('Cloud load failed:', e);
          setSyncStatus('offline');
        }
      };

      const runMigration = async () => {
        if (!pendingMigrationData) return;
        setSyncStatus('syncing');
        setShowMigrationPrompt(false);
        const result = await api.post('tcq-data', {
          action: 'import',
          quotes: pendingMigrationData.quotes,
          customers: pendingMigrationData.customers
        });
        if (result && result.success) {
          localStorage.setItem(MIGRATION_KEY, '1');
          alert(`Data imported! ${result.quotesInserted} quotes and ${result.customersInserted} customers are now synced across all devices.`);
          await loadCloudData({ quotes: [], customers: [] });
        } else {
          setSyncStatus('offline');
          alert('Import failed — your local data is still intact. Try again when you have a connection.');
        }
      };

      const handlePinKey = (digit) => {
        if (loginLoading) return;
        setLoginError('');
        setPinEntry(prev => prev.length < 4 ? prev + digit : prev);
      };

      const handlePinBackspace = () => {
        if (loginLoading) return;
        setLoginError('');
        setPinEntry(prev => prev.slice(0, -1));
      };

      const handlePinSubmit = async (currentPin) => {
        const pin = currentPin || pinEntry;
        if (pin.length !== 4 || loginLoading) return;
        setLoginLoading(true);
        setLoginError('');
        try {
          const res = await fetch(`${TGR_API}/tcq-auth`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin })
          });
          const d = await res.json();
          if (d.success) {
            authToken = d.token;
            setUser(d.user);
            setPinEntry('');
            // Load cloud data after login (pass current localStorage state for migration check)
            const localSnapshot = loadFromStorage() || { quotes: [], customers: [] };
            loadCloudData(localSnapshot);
          } else {
            setLoginError(d.error || 'Incorrect PIN');
            setPinEntry('');
          }
        } catch (e) {
          setLoginError('Connection error — try again');
          setPinEntry('');
        } finally {
          setLoginLoading(false);
        }
      };

      const handlePinDigit = (digit) => {
        if (loginLoading) return;
        setLoginError('');
        const next = pinEntry.length < 4 ? pinEntry + digit : pinEntry;
        setPinEntry(next);
        if (next.length === 4) handlePinSubmit(next);
      };
      
      const addCustomer = async (c) => {
        const cloudRes = await api.post('tcq-data', { type: 'customers', data: c });
        const saved = { ...c, _id: cloudRes?._id || Date.now().toString() };
        setData(prev => ({ ...prev, customers: [...prev.customers, saved] }));
      };
      const updateCustomer = async (c) => {
        await api.put('tcq-data', { type: 'customers', id: c._id, data: c });
        setData(prev => ({ ...prev, customers: prev.customers.map(x => x._id === c._id ? c : x) }));
      };
      const updateSource = (s) => setData({ ...data, sourceLocations: data.sourceLocations.map(x => x._id === s._id ? s : x) });
      const addSource = (s) => setData({ ...data, sourceLocations: [...data.sourceLocations, s] });
      const updateMaterial = (m) => setData({ ...data, materials: data.materials.map(x => x._id === m._id ? m : x) });
      const addMaterial = (m) => setData({ ...data, materials: [...data.materials, m] });

      const saveQuote = async (q, send) => {
        const isNew = !editQuote?._id;
        let finalQuote = { ...q };

        if (isNew) {
          // Get quote number from server log
          try {
            const logRes = await api.post('tcq-log-quote', {
              salesRepSnapshot: q.salesRepSnapshot,
              customerSnapshot: q.customerSnapshot,
              projectName: q.projectName,
              lineItems: q.lineItems,
              deliveryMethod: q.deliveryMethod,
              paymentTerms: q.paymentTerms,
              quoteData: q
            });
            if (logRes && logRes.quoteNumber) {
              finalQuote = { ...finalQuote, quoteNumber: logRes.quoteNumber };
            }
          } catch (e) {
            console.error('Failed to log quote:', e);
          }

          // Save to MongoDB (source of truth)
          const cloudRes = await api.post('tcq-data', { type: 'quotes', data: finalQuote });
          const savedQuote = {
            ...finalQuote,
            _id: cloudRes?._id || Date.now().toString(),
            createdAt: new Date().toISOString()
          };
          setData(prev => ({ ...prev, quotes: [savedQuote, ...prev.quotes] }));
        } else {
          // Update in MongoDB
          await api.put('tcq-data', { type: 'quotes', id: editQuote._id, data: finalQuote });
          setData(prev => ({
            ...prev,
            quotes: prev.quotes.map(x => x._id === editQuote._id
              ? { ...x, ...finalQuote, updatedAt: new Date().toISOString() }
              : x)
          }));
        }

        setShowForm(false); setEditQuote(null);

        if (send) {
          const toEmail = finalQuote.customerSnapshot?.contactEmail;
          if (!toEmail) {
            alert('Quote saved as draft — no email address on file for this customer. Add one in the Customers tab then re-send.');
            return;
          }
          try {
            const emailRes = await fetch('https://texasgotrocks.com/.netlify/functions/tcq-send-quote', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                quote: finalQuote,
                cc: [
                  { email: finalQuote.salesRepSnapshot?.email, name: finalQuote.salesRepSnapshot?.name },
                  { email: 'corey@tcmaterialsllc.com', name: 'Corey L. Pelletier' }
                ].filter(r => r.email)
              })
            });
            const emailData = await emailRes.json();
            if (emailData.success) {
              alert(`Quote sent to ${toEmail}`);
            } else {
              alert(`Quote saved, but email failed: ${emailData.error || 'Unknown error'}`);
            }
          } catch (e) {
            console.error('Email send failed:', e);
            alert('Quote saved, but email could not be sent. Check your connection.');
          }
        }
      };

      const revise = (q) => { setEditQuote({ ...q, _id: null, revisionNumber: (q.revisionNumber || 0) + 1, status: 'draft', previousVersionId: q._id }); setShowForm(true); };

      if (!user) {
        const pinDots = Array.from({ length: 4 }, (_, i) => (
          <div key={i} style={{
            width: '18px', height: '18px', borderRadius: '50%',
            background: i < pinEntry.length ? '#f97316' : 'transparent',
            border: `2px solid ${i < pinEntry.length ? '#f97316' : '#cbd5e1'}`,
            transition: 'all 0.15s'
          }} />
        ));

        const PinKey = ({ label, onClick, style = {} }) => (
          <button
            onClick={onClick}
            disabled={loginLoading}
            style={{
              width: '72px', height: '72px', borderRadius: '50%',
              border: '2px solid #e2e8f0', background: '#fff',
              fontSize: '24px', fontWeight: '700', color: '#1e3a5f',
              cursor: loginLoading ? 'not-allowed' : 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'background 0.1s', ...style
            }}
            onMouseDown={e => e.currentTarget.style.background = '#f1f5f9'}
            onMouseUp={e => e.currentTarget.style.background = '#fff'}
            onTouchStart={e => e.currentTarget.style.background = '#f1f5f9'}
            onTouchEnd={e => { e.currentTarget.style.background = '#fff'; onClick(); }}
          >{label}</button>
        );

        return (
          <div style={{minHeight:'100vh', background:'linear-gradient(135deg,#1e3a5f,#0f2440)', display:'flex', alignItems:'center', justifyContent:'center', padding:'24px'}}>
            <div style={{background:'#fff', borderRadius:'24px', boxShadow:'0 25px 60px rgba(0,0,0,0.3)', padding:'40px 36px', width:'100%', maxWidth:'360px', textAlign:'center'}}>
              <img src="/apple-touch-icon.png" alt="T&C Ez Quote" style={{width:'80px', height:'80px', borderRadius:'18px', margin:'0 auto 16px', display:'block', boxShadow:'0 4px 16px rgba(0,0,0,0.15)'}} />
              <h1 style={{fontSize:'22px', fontWeight:'900', color:'#1e3a5f', margin:'0 0 4px'}}>T&amp;C Ez Quote</h1>
              <p style={{fontSize:'13px', color:'#94a3b8', margin:'0 0 32px'}}>T&amp;C Materials, LLC</p>

              {/* PIN dots */}
              <div style={{display:'flex', justifyContent:'center', gap:'16px', marginBottom:'8px'}}>
                {pinDots}
              </div>

              {/* Error or prompt */}
              <div style={{height:'22px', marginBottom:'24px'}}>
                {loginError
                  ? <p style={{color:'#ef4444', fontSize:'13px', fontWeight:'600', margin:0}}>{loginError}</p>
                  : <p style={{color:'#94a3b8', fontSize:'13px', margin:0}}>{loginLoading ? 'Verifying...' : 'Enter your PIN'}</p>}
              </div>

              {/* Keypad */}
              <div style={{display:'grid', gridTemplateColumns:'repeat(3,72px)', gap:'14px', justifyContent:'center'}}>
                {['1','2','3','4','5','6','7','8','9'].map(d => (
                  <PinKey key={d} label={d} onClick={() => handlePinDigit(d)} />
                ))}
                {/* Empty left, 0 center, backspace right */}
                <div />
                <PinKey label="0" onClick={() => handlePinDigit('0')} />
                <PinKey label="⌫" onClick={handlePinBackspace} style={{fontSize:'20px', color:'#64748b'}} />
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-100 flex">
          {/* Migration prompt modal */}
          {showMigrationPrompt && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
              <div style={{background:'#fff',borderRadius:'16px',padding:'32px',maxWidth:'400px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
                <div style={{fontSize:'32px',marginBottom:'12px'}}>☁️</div>
                <h2 style={{fontSize:'18px',fontWeight:'800',color:'#1e3a5f',marginBottom:'8px'}}>Sync your existing data</h2>
                <p style={{fontSize:'14px',color:'#64748b',marginBottom:'8px'}}>
                  You have <strong>{pendingMigrationData?.quotes?.length || 0} quotes</strong> and <strong>{pendingMigrationData?.customers?.length || 0} customers</strong> saved locally on this device.
                </p>
                <p style={{fontSize:'14px',color:'#64748b',marginBottom:'24px'}}>
                  Upload them to the cloud now so they're available on every device — nothing will be lost.
                </p>
                <div style={{display:'flex',gap:'12px'}}>
                  <button onClick={runMigration} style={{flex:1,background:'#f97316',color:'#fff',border:'none',borderRadius:'10px',padding:'12px',fontWeight:'700',fontSize:'15px',cursor:'pointer'}}>
                    Upload to Cloud
                  </button>
                  <button onClick={() => { setShowMigrationPrompt(false); localStorage.setItem(MIGRATION_KEY, '1'); }} style={{flex:1,background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:'10px',padding:'12px',fontWeight:'600',fontSize:'14px',cursor:'pointer'}}>
                    Skip
                  </button>
                </div>
              </div>
            </div>
          )}
          <aside className={`${sidebar ? 'w-56' : 'w-14 mobile-hidden'} bg-tc-blue text-white transition-all flex flex-col`}>
            <div className="p-3 border-b border-blue-800 flex items-center gap-2">
              <div className="w-8 h-8 bg-tc-orange rounded flex items-center justify-center flex-shrink-0"><Icons.Building /></div>
              {sidebar && <div><h1 className="font-bold text-sm">T&C Ez Quote</h1></div>}
            </div>
            <nav className="flex-1 p-2 space-y-1">
              <button onClick={() => { setPage('quotes'); setShowForm(false); }} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'quotes' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.FileText />{sidebar && 'Quote Log'}</button>
              <button onClick={() => setPage('customers')} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'customers' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.Users />{sidebar && 'Customers'}</button>
              <button onClick={() => setPage('pricing')} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'pricing' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.Package />{sidebar && 'Pricing'}</button>
              <button onClick={() => setPage('sources')} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'sources' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.MapPin />{sidebar && 'Sources'}</button>
            </nav>
            <div className="p-2 border-t border-blue-800">
              {sidebar && (
                <div className="px-2 mb-2">
                  <p className="text-xs text-white">{user.name}</p>
                  {syncStatus === 'syncing' && <p className="text-xs text-blue-300">⏳ Syncing...</p>}
                  {syncStatus === 'synced' && <p className="text-xs text-green-400">✓ Synced</p>}
                  {syncStatus === 'offline' && <p className="text-xs text-yellow-400">⚠ Offline</p>}
                </div>
              )}
              <button onClick={() => { setUser(null); authToken = null; }} className="w-full flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-blue-800"><Icons.LogOut />{sidebar && 'Logout'}</button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col">
            <header className="bg-white shadow-sm px-4 py-3 flex items-center gap-3">
              <button onClick={() => setSidebar(!sidebar)} className="p-1.5 hover:bg-gray-100 rounded"><Icons.Menu /></button>
              <h2 className="text-lg font-semibold text-tc-blue capitalize">{page === 'quotes' && !showForm ? 'Quote Log' : page === 'sources' ? 'Source Locations' : page}</h2>
            </header>
            <div className="flex-1 p-4 overflow-auto">
              {page === 'quotes' && !showForm && <QuoteLog quotes={data.quotes} onEdit={(q) => { setEditQuote(q); setShowForm(true); }} onRevise={revise} onNew={() => { setEditQuote(null); setShowForm(true); }} />}
              {page === 'quotes' && showForm && <QuoteForm quote={editQuote} customers={data.customers} currentUser={user} onSave={saveQuote} onCancel={() => { setShowForm(false); setEditQuote(null); }} onAddCustomer={addCustomer} />}
              {page === 'customers' && <CustomersPage customers={data.customers} onUpdate={updateCustomer} />}
              {page === 'pricing' && <PricingMatrixManager materials={data.materials} sources={data.sourceLocations} onUpdateMaterial={updateMaterial} onAddMaterial={addMaterial} />}
              {page === 'sources' && <SourceLocationsManager sources={data.sourceLocations} onUpdate={updateSource} onAdd={addSource} />}
            </div>
          </main>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
