        return h;

      async get(path) {
        try {
          const res = await fetch(`${TGR_API}/${path}`, { headers: this._headers() });
          if (!res.ok) throw new Error(`${res.status}`);
          return await res.json();
        } catch (e) {
          console.error(`GET ${path} failed:`, e);
          return null;
        }

            method: 'POST',
            headers: this._headers(),
            body: JSON.stringify(data)

          console.error(`POST ${path} failed:`, e);

        } catch (e) {
          setMapError('Connection error. Check your internet and try again.');
        } finally {
          setMapLoading(false);
        }
      };

      const applyMapTime = () => {
        if (!mapResult) return;
        setTravelTime(String(mapResult.durationMinutes));
        setShowMapPanel(false);
        setMapResult(null);
      };

      const calculate = () => {
        const rate = parseFloat(hourlyRate) || 0;
        const tollCost = parseFloat(tolls) || 0;
        const travel = parseFloat(travelTime) || 0;
        const loading = parseFloat(loadingTime) || 0;
        const unloading = parseFloat(unloadingTime) || 0;
        const capacityTons = parseFloat(truckCapacityTons) || 21;
        const density = parseFloat(materialDensity) || 1.4;
        const trips = parseFloat(roundTrips) || 1;
        
        // Calculate CY capacity from tons and material density
        const capacityCY = capacityTons / density;
        
        // Time calculations
        const timePerTrip = (travel * 2) + loading + unloading;
        const hoursPerTrip = timePerTrip / 60;
        
        // Cost per trip
        const costPerTrip = (rate * hoursPerTrip) + tollCost;
        
        // Cost per unit
        const costPerTon = costPerTrip / capacityTons;
        const costPerCY = costPerTrip / capacityCY;
        
        // Daily revenue
        const dailyRevenue = costPerTrip * trips;
        
        return { 
          timePerTrip: timePerTrip.toFixed(0), 
          hoursPerTrip: hoursPerTrip.toFixed(2),
          costPerTrip: costPerTrip.toFixed(2),
          capacityCY: capacityCY.toFixed(1),
          costPerCY: costPerCY.toFixed(2), 
          costPerTon: costPerTon.toFixed(2),
          dailyRevenue: dailyRevenue.toFixed(2)
        };
      };

      const results = calculate();
      if (!isOpen) return null;

      const selectedCost = outputUnit === 'CY' ? results.costPerCY : results.costPerTon;

      const handleApply = () => {
        onApply({ 
          costPerUnit: parseFloat(selectedCost), 
          unit: outputUnit,
          description: description || `Trucking - ${travelTime} min each way`,
          timestamp: Date.now()
        }); 
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
            <div className="bg-tc-blue text-white p-4 flex justify-between items-center">

              <button onClick={onClose} className="hover:text-gray-300"><Icons.X /></button>
            </div>
            <div className="p-4 space-y-3 max-h-[65vh] overflow-y-auto">
              
              {/* Truck Type Presets */}

                <label className="block text-xs font-semibold text-gray-700 mb-2">Truck Type (Legal Weight Limit)</label>
                <div className="grid grid-cols-2 gap-2">

                    <button key={preset.name} onClick={() => setTruckCapacityTons(preset.tons)} className={`p-2 text-xs border rounded text-left hover:bg-orange-50 ${truckCapacityTons === preset.tons ? 'border-tc-orange bg-orange-50' : 'border-gray-300'}`}>
                      <div className="font-semibold">{preset.name}</div>
                      <div className="text-gray-500">{preset.tons} tons</div>
                    </button>
                  ))}
                </div>
              </div>
              
              <div>
                <label className="block text-xs font-semibold text-gray-700 mb-1">Truck Capacity (Tons)</label>
                <input type="number" value={truckCapacityTons} onChange={(e) => setTruckCapacityTons(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900" />
              </div>

              {/* Material Density */}
              <div>
                <label className="block text-xs font-semibold text-gray-700 mb-1">Material Type</label>
                <select value={materialDensity} onChange={(e) => setMaterialDensity(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900">
                  {materialPresets.map(m => <option key={m.name} value={m.density}>{m.name} ({m.density} tons/CY)</option>)}
                </select>
                <p className="text-xs text-gray-500 mt-1">= {results.capacityCY} CY per load at {truckCapacityTons} tons</p>
              </div>

              <div className="border-t pt-3">
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Hourly Rate ($)</label><input type="number" value={hourlyRate} onChange={(e) => setHourlyRate(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900" /></div>
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Tolls Round Trip ($)</label><input type="number" value={tolls} onChange={(e) => setTolls(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900" /></div>
                </div>
              </div>
              
              {/* Travel Time + Map Out Haul */}
              <div>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}>
                  <label className="block text-xs font-semibold text-gray-700">Travel Time One Way (min)</label>
                  <button
                    onClick={() => { setShowMapPanel(!showMapPanel); setMapError(''); setMapResult(null); }}
                    style={{
                      display:'inline-flex', alignItems:'center', gap:'5px',
                      padding:'4px 10px', fontSize:'11px', fontWeight:700,
                      background: showMapPanel ? '#16a34a' : '#fff',
                      color: showMapPanel ? '#fff' : '#16a34a',
                      border:'1.5px solid #16a34a', borderRadius:'6px', cursor:'pointer',
                      letterSpacing:'0.02em', whiteSpace:'nowrap'
                    }}>
                    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />

                <input

                {/* Map Out Haul Panel */}
                {showMapPanel && (

                    <div style={{marginBottom:'8px'}}>

                      <input

                    {mapResult && (

                            alt="Route map"
                            style={{width:'100%', display:'block', maxHeight:'180px', objectFit:'cover'}}

                        <div style={{padding:'10px 12px'}}>
                          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}>
                            <span style={{fontSize:'13px', fontWeight:800, color:'#15803d'}}>🕐 {mapResult.durationMinutes} min one way</span>
                            <span style={{fontSize:'12px', color:'#166534', fontWeight:600}}>{mapResult.distanceMiles} mi</span>
                          </div>
                          <p style={{margin:'0', fontSize:'11px', color:'#4b7280'}}>
                            via {mapResult.summary} · {mapResult.durationText}{avoidTolls && ' · Toll-free route'}
                          </p>
                          <button
                            onClick={applyMapTime}
                            style={{marginTop:'8px', width:'100%', padding:'8px', background:'#16a34a', color:'#fff', border:'none', borderRadius:'6px', fontWeight:800, fontSize:'13px', cursor:'pointer'}}>
                            ✓ Use {mapResult.durationMinutes} min
                          </button>
                        </div>
                      </div>
                    )}

                    <button
                      onClick={fetchDriveTime}
                      disabled={mapLoading}
                      style={{
                        width:'100%', padding:'9px', fontSize:'13px', fontWeight:800,
                        background: mapLoading ? '#94a3b8' : '#1e3a5f',
                        color:'#fff', border:'none', borderRadius:'7px',
                        cursor: mapLoading ? 'not-allowed' : 'pointer',
                        display:'flex', alignItems:'center', justifyContent:'center', gap:'6px'
                      }}>
                      {mapLoading ? 'Getting Route...' : 'Get Drive Time'}
                    </button>
                  </div>
                )}
              </div>
              {/* End Map Out Haul */}
              
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-semibold text-gray-700 mb-1">Loading (min)</label><input type="number" value={loadingTime} onChange={(e) => setLoadingTime(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900" /></div>

                    <p className="text-xs opacity-75">Cost per CY</p>
                    <p className="text-xl font-bold">${results.costPerCY}</p>
                  </div>

                  ${results.costPerTrip}/trip | {results.hoursPerTrip} hrs/trip | ${results.dailyRevenue}/day
                </div>
              </div>
              
              <div>
                <label className="block text-xs font-semibold text-gray-700 mb-1">Line Item Description</label>
                <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900" placeholder="Trucking / Hauling" />
              </div>

            <div className="p-4 border-t flex gap-3">
              <button onClick={onClose} className="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50">Close</button>
              <button onClick={handleApply} className="flex-1 px-4 py-2.5 bg-tc-orange text-white rounded-lg font-medium hover:bg-orange-600">Add ${selectedCost}/{outputUnit}</button>
            </div>
          </div>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      );
    };

      const [editForm, setEditForm] = useState({});
      const [showAddForm, setShowAddForm] = useState(false);

        setEditForm({ ...source });

        onUpdate(editForm);
        setEditingId(null);
      };

        if (!newSource.name) { alert('Source name is required'); return; }
