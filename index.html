    // API Helper
    const api = {
      async get(endpoint) {
        if (!USE_API) return null;
        try {
          const res = await fetch(`${API_BASE}/${endpoint}`);
          if (!res.ok) throw new Error(`API error: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error(`GET ${endpoint} failed:`, e);
          return null;
        }
      },
      async post(endpoint, data) {
        if (!USE_API) return null;
        try {
          const res = await fetch(`${API_BASE}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          if (!res.ok) throw new Error(`API error: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error(`POST ${endpoint} failed:`, e);
          return null;
        }
      },
      async put(endpoint, data) {
        if (!USE_API) return null;
        try {
          const res = await fetch(`${API_BASE}/${endpoint}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          if (!res.ok) throw new Error(`API error: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error(`PUT ${endpoint} failed:`, e);
          return null;
        }
      },
      async delete(endpoint) {
        if (!USE_API) return null;
        try {
          const res = await fetch(`${API_BASE}/${endpoint}`, { method: 'DELETE' });
          if (!res.ok) throw new Error(`API error: ${res.status}`);
          return await res.json();
        } catch (e) {
          console.error(`DELETE ${endpoint} failed:`, e);
          return null;
        }
      }
    };

    // ============================================
    // TRUCK RATE CALCULATOR
    // ============================================
    const TruckRateCalculator = ({ isOpen, onClose, onApply }) => {
      const [hourlyRate, setHourlyRate] = useState('125');
      const [tolls, setTolls] = useState('0');
      const [travelTime, setTravelTime] = useState('30');
      const [loadingTime, setLoadingTime] = useState('5');
      const [unloadingTime, setUnloadingTime] = useState('5');
      const [truckCapacityTons, setTruckCapacityTons] = useState('21');
      const [materialDensity, setMaterialDensity] = useState('1.4');
      const [roundTrips, setRoundTrips] = useState('3');
      const [description, setDescription] = useState('Trucking / Hauling');
      const [outputUnit, setOutputUnit] = useState('Tons');

      // Truck type presets - TONS only (legal weight limits)
      const truckPresets = [
        { name: 'End Dump (Truck & Trailer)', tons: '21' },
        { name: 'Tandem', tons: '15' },
        { name: 'Super Dump', tons: '26' },
        { name: 'Belly Dump', tons: '24' },
      ];

      // Material density presets (tons per CY)
      const materialPresets = [
        { name: 'Gravel/Limestone', density: '1.4' },
        { name: 'Road Base', density: '1.5' },
        { name: 'Sand', density: '1.35' },
        { name: 'Crushed Concrete', density: '1.3' },
        { name: 'Topsoil', density: '1.1' },
        { name: 'Clay/Fill Dirt', density: '1.25' },
      ];

      const calculate = () => {
        const rate = parseFloat(hourlyRate) || 0;
        const tollCost = parseFloat(tolls) || 0;
        const travel = parseFloat(travelTime) || 0;
        const loading = parseFloat(loadingTime) || 0;
        const unloading = parseFloat(unloadingTime) || 0;
        const capacityTons = parseFloat(truckCapacityTons) || 21;
        const density = parseFloat(materialDensity) || 1.4;
        const trips = parseFloat(roundTrips) || 1;
        
        // Calculate CY capacity from tons and material density
        const capacityCY = capacityTons / density;
        
        // Time calculations
        const timePerTrip = (travel * 2) + loading + unloading;
        const hoursPerTrip = timePerTrip / 60;
        
        // Cost per trip
        const costPerTrip = (rate * hoursPerTrip) + tollCost;
        
        // Cost per unit
        const costPerTon = costPerTrip / capacityTons;
        const costPerCY = costPerTrip / capacityCY;
        
        // Daily revenue
        const dailyRevenue = costPerTrip * trips;
        
        return { 
          timePerTrip: timePerTrip.toFixed(0), 
          hoursPerTrip: hoursPerTrip.toFixed(2),
          costPerTrip: costPerTrip.toFixed(2),
          capacityCY: capacityCY.toFixed(1),
          costPerCY: costPerCY.toFixed(2), 
          costPerTon: costPerTon.toFixed(2),
          dailyRevenue: dailyRevenue.toFixed(2)
        };
      };

      const results = calculate();
      if (!isOpen) return null;

      const selectedCost = outputUnit === 'CY' ? results.costPerCY : results.costPerTon;

      const handleApply = () => {
        onApply({ 
          costPerUnit: parseFloat(selectedCost), 
          unit: outputUnit,
          description: description || `Trucking - ${travelTime} min each way`,
          timestamp: Date.now()
        }); 
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">

              <button onClick={onClose} className="hover:text-gray-300"><Icons.X /></button>
            </div>
            <div className="p-4 space-y-3 max-h-[65vh] overflow-y-auto">
              
              {/* Truck Type Presets */}
              <div>
                <label className="block text-xs font-semibold text-gray-700 mb-2">Truck Type (Legal Weight Limit)</label>
                <div className="grid grid-cols-2 gap-2">
                  {truckPresets.map(preset => (
                    <button key={preset.name} onClick={() => setTruckCapacityTons(preset.tons)} className={`p-2 text-xs border rounded text-left hover:bg-orange-50 ${truckCapacityTons === preset.tons ? 'border-tc-orange bg-orange-50' : 'border-gray-300'}`}>
                      <div className="font-semibold">{preset.name}</div>
                      <div className="text-gray-500">{preset.tons} tons</div>
                    </button>
                  ))}
                </div>
              </div>
              
              <div>
                <label className="block text-xs font-semibold text-gray-700 mb-1">Truck Capacity (Tons)</label>
                <input type="number" value={truckCapacityTons} onChange={(e) => setTruckCapacityTons(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900" />
              </div>

              {/* Material Density */}
              <div>
                <label className="block text-xs font-semibold text-gray-700 mb-1">Material Type</label>
                <select value={materialDensity} onChange={(e) => setMaterialDensity(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-900">
                  {materialPresets.map(m => <option key={m.name} value={m.density}>{m.name} ({m.density} tons/CY)</option>)}
                </select>
                <p className="text-xs text-gray-500 mt-1">= {results.capacityCY} CY per load at {truckCapacityTons} tons</p>
              </div>

              <div className="border-t pt-3">
                <div className="grid grid-cols-2 gap-3">

                        <td className="py-2 px-4 text-center"><span className="px-2 py-0.5 bg-gray-100 rounded text-xs">{mat.materialType}</span></td>
                        <td className="py-2 px-4 text-center">{mat.unit}</td>
                        <td className="py-2 px-4 text-right font-medium">{formatCurrency(mat.basePrice)}</td>
                        <td className="py-2 px-4 text-center">
                          <button onClick={() => startEdit(mat)} className="p-1 text-tc-orange hover:text-orange-600"><Icons.Edit /></button>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================
    // LINE ITEM ROW
    // ============================================
    const LineItemRow = ({ item, index, materials, sources, onUpdate, onRemove, canBundle }) => {
      const [selectedSource, setSelectedSource] = useState(item.sourceLocationId || '');
      const filteredMaterials = selectedSource ? materials.filter(m => m.sourceLocationId === selectedSource && m.active) : materials.filter(m => m.active);
      const getSourceName = (id) => sources.find(s => s._id === id)?.name || '';

      const handleMaterialSelect = (materialId) => {
        if (materialId === 'custom') {
          onUpdate(index, { ...item, materialId: null });
          return;
        }
        const material = materials.find(m => m._id === materialId);
        if (material) {
          onUpdate(index, { ...item, materialId, sourceLocationId: material.sourceLocationId, description: material.materialName, unit: material.unit, priceEach: material.basePrice, priceTotal: item.quantity * material.basePrice });
        }
      };

      return (
        <tr className={`border-b hover:bg-gray-50 ${item.bundleWithPrevious ? 'bg-orange-50' : ''}`}>
          <td className="py-2 px-2 text-center text-gray-500">
            {item.bundleWithPrevious ? <span className="text-tc-orange text-xs">↳</span> : index + 1}
          </td>
          <td className="py-2 px-2">
            <select value={selectedSource} onChange={(e) => setSelectedSource(e.target.value)} className="w-full border rounded px-2 py-1 text-sm mb-1">
              <option value="">All Sources</option>
              {sources.filter(s => s.active).map(source => <option key={source._id} value={source._id}>{source.name}</option>)}
            </select>
            <select value={item.materialId || ''} onChange={(e) => handleMaterialSelect(e.target.value)} className="w-full border rounded px-2 py-1 text-sm">
              <option value="">Select material...</option>
              {filteredMaterials.map(mat => <option key={mat._id} value={mat._id}>{mat.materialName} - ${mat.basePrice}/{mat.unit}</option>)}
              <option value="custom">-- Custom Item --</option>
            </select>
          </td>
          <td className="py-2 px-2">
            <input type="text" value={item.description} onChange={(e) => onUpdate(index, { ...item, description: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" placeholder="Description" />
            {canBundle && (
              <label className={`flex items-center gap-2 mt-1 text-xs cursor-pointer p-1 rounded ${item.bundleWithPrevious ? 'bg-orange-100 border border-orange-300' : ''}`}>
                <input 
                  type="checkbox" 
                  checked={item.bundleWithPrevious || false} 
                  onChange={(e) => onUpdate(index, { ...item, bundleWithPrevious: e.target.checked })}
                  className="rounded border-gray-300 text-tc-orange focus:ring-tc-orange"
                />
                <span className={item.bundleWithPrevious ? 'text-orange-700 font-semibold' : 'text-gray-600'}>
                  {item.bundleWithPrevious ? '✓ Will bundle into line above' : 'Bundle into line above (hide on quote)'}
                </span>
              </label>
            )}
          </td>
          <td className="py-2 px-2"><input type="number" value={item.quantity || ''} onChange={(e) => { const qty = parseFloat(e.target.value) || 0; onUpdate(index, { ...item, quantity: qty, priceTotal: qty * item.priceEach }); }} className="w-full border rounded px-2 py-1 text-sm text-right min-w-[100px]" /></td>
          <td className="py-2 px-2">
            <select value={item.unit} onChange={(e) => onUpdate(index, { ...item, unit: e.target.value })} className="w-full border rounded px-2 py-1 text-sm min-w-[70px]">
              <option value="Tons">Tons</option><option value="CY">CY</option>
            </select>
          </td>
          <td className="py-2 px-2"><input type="number" value={item.priceEach || ''} onChange={(e) => { const price = parseFloat(e.target.value) || 0; onUpdate(index, { ...item, priceEach: price, priceTotal: item.quantity * price }); }} className="w-full border rounded px-2 py-1 text-sm text-right" step="0.01" /></td>
          <td className="py-2 px-2 text-right font-medium">{formatCurrency(item.priceTotal || 0)}</td>
          <td className="py-2 px-2 text-center"><button onClick={() => onRemove(index)} className="text-red-500 hover:text-red-700"><Icons.Trash /></button></td>
        </tr>
      );
    };

    // ============================================
    // QUOTE PREVIEW - Combines bundled items for customer view
    // ============================================
    const QuotePreview = ({ quote, onClose, onSign, onSend }) => {
      const [tcSignature, setTcSignature] = useState(quote.tcSignature || '');
      const [tcSignDate, setTcSignDate] = useState(quote.tcSignDate || '');
      const [customerSignature, setCustomerSignature] = useState(quote.customerSignature || '');
      const [customerSignDate, setCustomerSignDate] = useState(quote.customerSignDate || '');
      const [showSigningPanel, setShowSigningPanel] = useState(false);
      const [isSigned, setIsSigned] = useState(!!(quote.tcSignature));

      if (!quote) return null;

      // Process line items to combine bundled ones
      const getDisplayLineItems = () => {
        const displayItems = [];
        
        for (let i = 0; i < quote.lineItems.length; i++) {
          const item = quote.lineItems[i];
          
          if (item.bundleWithPrevious && displayItems.length > 0) {
            // Add this item's unit price to the previous item
            const prevItem = displayItems[displayItems.length - 1];
            prevItem.priceEach = (prevItem.priceEach || 0) + (item.priceEach || 0);
            prevItem.priceTotal = prevItem.quantity * prevItem.priceEach;
          } else {
            // Add as new item (clone to avoid mutating original)
            displayItems.push({ ...item });
          }
        }
        
        return displayItems;
      };

      const displayItems = getDisplayLineItems();
      const displaySubtotal = displayItems.reduce((sum, item) => sum + (item.priceTotal || 0), 0);
      const hasBundledItems = quote.lineItems.some(item => item.bundleWithPrevious);

      const handleSignAndSave = () => {
        if (!tcSignature.trim()) {
          alert('Please type your name to sign');
          return;
        }
        const sigData = {
          tcSignature,
          tcSignDate: tcSignDate || new Date().toISOString().split('T')[0],
          customerSignature,
          customerSignDate
        };
        if (onSign) {
          onSign(sigData);
        }
        setIsSigned(true);
        setShowSigningPanel(false);
      };

      const handleSendQuote = () => {
        if (onSend) {
          onSend({
            tcSignature,
            tcSignDate: tcSignDate || new Date().toISOString().split('T')[0]
          });
        }
      };

      const today = new Date().toISOString().split('T')[0];

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
            <div className="bg-tc-blue text-white p-4 flex justify-between items-center">
              <h3 className="font-bold">Quote Preview - {quote.quoteNumber} <span className="text-sm font-normal opacity-75">(Customer View)</span></h3>
              <div className="flex gap-2">
                {/* Show Sign button only if not signed and onSign is available */}
                {onSign && !isSigned && (
                  <button onClick={() => setShowSigningPanel(!showSigningPanel)} className="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600 flex items-center gap-1 text-sm">
                    <Icons.Edit /> Sign
                  </button>
                )}
                {/* Always show Print */}
                <button onClick={() => window.print()} className="px-3 py-1 bg-white text-tc-blue rounded hover:bg-gray-100 flex items-center gap-1 text-sm">
                  <Icons.Printer /> Print
                </button>
                {/* Show Save & Send after signing */}
                {isSigned && onSend && (
                  <button onClick={handleSendQuote} className="px-3 py-1 bg-tc-orange text-white rounded hover:bg-orange-600 flex items-center gap-1 text-sm">
                    <Icons.Send /> Save & Send
                  </button>
                )}
                <button onClick={onClose} className="hover:text-gray-300"><Icons.X /></button>
              </div>
            </div>
            
            {/* Signing Panel */}
            {showSigningPanel && onSign && !isSigned && (
              <div className="bg-green-50 border-b border-green-200 p-4 no-print">
                <h4 className="font-semibold text-green-800 mb-3">Sign Quote Before Sending</h4>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">T&C Materials Signature</label>
                    <input type="text" value={tcSignature} onChange={(e) => setTcSignature(e.target.value)} placeholder="Type your name to sign" className="w-full border border-gray-300 rounded px-3 py-2 text-sm italic" style={{fontFamily: 'cursive'}} />
                    <label className="block text-xs font-semibold text-gray-700 mb-1 mt-2">Date</label>
                    <input type="date" value={tcSignDate || today} onChange={(e) => setTcSignDate(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
                  </div>
                  <div className="flex flex-col justify-between">
                    <p className="text-xs text-gray-600"><strong>Note:</strong> Your signature will appear on the quote sent to the customer.</p>
                    <button onClick={handleSignAndSave} className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm font-medium">
                      <Icons.Check /> Apply Signature
                    </button>
                  </div>
                </div>
              </div>
            )}
            
            {/* Signed confirmation banner */}
            {isSigned && (
              <div className="bg-green-100 border-b border-green-300 p-2 text-center text-green-800 text-sm no-print">
                <strong>✓ Signed by {tcSignature}</strong> on {tcSignDate || today} — Ready to send!
              </div>
            )}

            <div className="flex-1 overflow-y-auto p-6 quote-preview text-sm">
              {hasBundledItems && (
                <div className="bg-orange-50 border border-orange-200 rounded p-3 mb-4 text-xs text-orange-800 no-print">
                  <strong>✓ Bundled Pricing Applied</strong>
                  <p className="mt-1">Transportation costs have been added to material unit prices. Customer sees single delivered price per unit.</p>
                </div>
              )}
              <div className="text-center mb-4">
                <img src="/tc-logo-dark.png" alt="T&C Materials, LLC" className="h-16 mx-auto mb-2" />
                <p className="font-bold text-lg">QUOTATION</p>
              </div>
              <div className="border text-xs mb-4">
                <div className="grid grid-cols-2">
                  <div className="border-r border-b p-2"><strong>Bid Date:</strong> {formatDate(quote.bidDate)}</div>
                  <div className="border-b p-2"><strong>Quote #:</strong> {quote.quoteNumber}{quote.revisionNumber > 0 ? `(R${quote.revisionNumber})` : ''}</div>
                  <div className="border-r border-b p-2"><strong>Customer:</strong> {quote.customerSnapshot?.companyName}</div>
                  <div className="border-b p-2"><strong>Sales Rep:</strong> {quote.salesRepSnapshot?.name}</div>
                  <div className="border-r border-b p-2"><strong>Attn:</strong> {quote.customerSnapshot?.contactName}</div>
                  <div className="border-b p-2"><strong>Email:</strong> {quote.salesRepSnapshot?.email}</div>
                  <div className="border-r border-b p-2"><strong>Expiration:</strong> {formatDate(quote.expirationDate)}</div>
                  <div className="border-b p-2"><strong>Delivery:</strong> {quote.deliveryMethod}</div>
                  <div className="border-r p-2"><strong>Project:</strong> {quote.projectName}</div>
                  <div className="p-2"><strong>Terms:</strong> {quote.paymentTerms}</div>
                </div>
              </div>
              <table className="w-full border text-xs mb-4">
                <thead className="bg-gray-100">
                  <tr><th className="border p-1.5 text-left">Item</th><th className="border p-1.5 w-16">QTY</th><th className="border p-1.5 w-14">Unit</th><th className="border p-1.5 w-24 text-right">Price Each</th><th className="border p-1.5 w-28 text-right">Total</th></tr>
                </thead>
                <tbody>
                  {displayItems.map((item, idx) => (
                    <tr key={idx}><td className="border p-1.5">{item.description}</td><td className="border p-1.5 text-center">{item.quantity?.toLocaleString()}</td><td className="border p-1.5 text-center">{item.unit}</td><td className="border p-1.5 text-right">{formatCurrency(item.priceEach)}</td><td className="border p-1.5 text-right">{formatCurrency(item.priceTotal)}</td></tr>
                  ))}
                  <tr className="bg-gray-100 font-bold"><td colSpan="4" className="border p-1.5 text-right">SUBTOTAL:</td><td className="border p-1.5 text-right">{formatCurrency(displaySubtotal)}</td></tr>
                </tbody>
              </table>
              {quote.scopeOfWork && <div className="mb-4"><p className="font-bold text-xs">Scope of Work:</p><p className="text-xs whitespace-pre-wrap">{quote.scopeOfWork}</p></div>}
              <div className="text-xs"><p className="font-bold mb-1">TERMS AND CONDITIONS</p><p className="text-[10px]">{TERMS_CONDITIONS}</p><p className="text-[10px] font-bold mt-2">{TAX_DISCLAIMER}</p></div>
              
              {/* Signature Section */}
              <div className="grid grid-cols-2 gap-8 mt-6 text-xs border-t pt-4">
                <div>
                  <p className="font-bold mb-2">Customer Acceptance:</p>
                  <div className="border-b border-gray-400 h-8 mb-1 flex items-end">
                    {(customerSignature || quote.customerSignature) && (
                      <span className="italic text-lg" style={{fontFamily: 'cursive'}}>{customerSignature || quote.customerSignature}</span>
                    )}
                  </div>
                  <p className="text-gray-500">Signature</p>
                  <div className="border-b border-gray-400 h-6 mt-3 mb-1 flex items-end">
                    <span>{customerSignDate || quote.customerSignDate || ''}</span>
                  </div>
                  <p className="text-gray-500">Date</p>
                </div>
                <div>
                  <p className="font-bold mb-2">T&C Materials, LLC:</p>
                  <div className="border-b border-gray-400 h-8 mb-1 flex items-end">
                    {(tcSignature || quote.tcSignature) && (
                      <span className="italic text-lg" style={{fontFamily: 'cursive'}}>{tcSignature || quote.tcSignature}</span>
                    )}
                  </div>
                  <p className="text-gray-500">Signature</p>
                  <div className="border-b border-gray-400 h-6 mt-3 mb-1 flex items-end">
                    <span>{tcSignDate || quote.tcSignDate || ''}</span>
                  </div>
                  <p className="text-gray-500">Date</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // QUOTE FORM
    // ============================================
    const QuoteForm = ({ quote, customers, materials, sources, currentUser, onSave, onCancel, onShowCalc, onAddCustomer, calcRate }) => {
      const today = new Date().toISOString().split('T')[0];
      const thirtyDays = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
      
      const [formData, setFormData] = useState({
        quoteNumber: quote?.quoteNumber || generateQuoteNumber(),
        revisionNumber: quote?.revisionNumber || 0,
        status: quote?.status || 'draft',
        bidDate: quote?.bidDate || today,
        expirationDate: quote?.expirationDate || thirtyDays,
        customerId: quote?.customerId || '',
        customerSnapshot: quote?.customerSnapshot || null,
        projectName: quote?.projectName || '',
        projectAddress: quote?.projectAddress || '',
        deliveryMethod: quote?.deliveryMethod || 'End Dumps',
        taxExemptStatus: quote?.taxExemptStatus || 'TBD',
        paymentTerms: quote?.paymentTerms || 'Net 30',
        lineItems: quote?.lineItems || [],
        scopeOfWork: quote?.scopeOfWork || '',
        salesRepSnapshot: quote?.salesRepSnapshot || { name: currentUser.name, phone: currentUser.phone, email: currentUser.email }
      });

      const [selectedCustomer, setSelectedCustomer] = useState(quote?.customerId ? customers.find(c => c._id === quote.customerId) : null);
      const [showPreview, setShowPreview] = useState(false);

      // Handle calculator rate being applied - add as new line item with auto-bundle
      useEffect(() => {
        if (calcRate && calcRate.costPerUnit && calcRate.timestamp) {
          const newItem = {
            itemNumber: formData.lineItems.length + 1,
            materialId: null,
            description: calcRate.description || 'Trucking / Hauling',
            quantity: 0,
            unit: calcRate.unit,
            priceEach: calcRate.costPerUnit,
            priceTotal: 0,
            bundleWithPrevious: formData.lineItems.length > 0 // Auto-bundle if there's a line above
          };
          setFormData(prev => ({
            ...prev,
            lineItems: [...prev.lineItems, newItem]
          }));
        }
      }, [calcRate?.timestamp]);

      const handleCustomerSelect = (customer) => {
        setSelectedCustomer(customer);
        const contact = customer.contacts.find(c => c.isPrimary) || customer.contacts[0];
        setFormData({
          ...formData,
          customerId: customer._id,
          customerSnapshot: { companyName: customer.companyName, shortName: customer.shortName, contactName: contact?.name || '', contactEmail: contact?.email || '', contactPhone: contact?.phone || '', address: customer.address || '' },
          paymentTerms: customer.paymentTerms || 'Net 30'
        });
      };

      const addLineItem = () => setFormData({ ...formData, lineItems: [...formData.lineItems, { itemNumber: formData.lineItems.length + 1, materialId: null, description: '', quantity: 0, unit: 'Tons', priceEach: 0, priceTotal: 0 }] });
      const updateLineItem = (idx, item) => { const items = [...formData.lineItems]; items[idx] = { ...item, itemNumber: idx + 1 }; setFormData({ ...formData, lineItems: items }); };
      const removeLineItem = (idx) => setFormData({ ...formData, lineItems: formData.lineItems.filter((_, i) => i !== idx).map((item, i) => ({ ...item, itemNumber: i + 1 })) });
      const subtotal = formData.lineItems.reduce((sum, item) => sum + (item.priceTotal || 0), 0);

      const handleSave = (send = false) => {
        if (!selectedCustomer) { alert('Please select a customer'); return; }
        if (!formData.projectName) { alert('Please enter a project name'); return; }
        if (formData.lineItems.length === 0) { alert('Please add at least one line item'); return; }
        onSave({ ...formData, subtotal, status: send ? 'sent' : 'draft' }, send);
      };

      return (
        <div className="bg-white rounded-lg shadow-lg p-6">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-tc-blue">{quote?._id ? 'Edit' : 'New'} Quote - {formData.quoteNumber}{formData.revisionNumber > 0 && <span className="text-tc-orange ml-2">(R{formData.revisionNumber})</span>}</h2>
            <div className="flex gap-2">
              <button onClick={() => setShowPreview(true)} className="flex items-center gap-1 px-3 py-2 border rounded hover:bg-gray-50 text-sm"><Icons.Eye /> Preview</button>
              <button onClick={onShowCalc} className="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded hover:bg-gray-200 text-sm"><Icons.Calculator /> Calculator</button>
            </div>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
            <div><label className="block text-xs font-medium mb-1">Bid Date</label><input type="date" value={formData.bidDate} onChange={(e) => setFormData({ ...formData, bidDate: e.target.value })} className="w-full border rounded px-3 py-2 text-sm" /></div>
            <div><label className="block text-xs font-medium mb-1">Expiration</label><input type="date" value={formData.expirationDate} onChange={(e) => setFormData({ ...formData, expirationDate: e.target.value })} className="w-full border rounded px-3 py-2 text-sm" /></div>
            <div><label className="block text-xs font-medium mb-1">Delivery</label>
              <select value={formData.deliveryMethod} onChange={(e) => setFormData({ ...formData, deliveryMethod: e.target.value })} className="w-full border rounded px-3 py-2 text-sm">
                <option>End Dumps</option><option>Tandem</option><option>Flatbed</option><option>Customer Pickup</option>
              </select>
            </div>
            <div><label className="block text-xs font-medium mb-1">Tax Exempt</label>
              <select value={formData.taxExemptStatus} onChange={(e) => setFormData({ ...formData, taxExemptStatus: e.target.value })} className="w-full border rounded px-3 py-2 text-sm">
                <option value="TBD">TBD</option><option value="Yes">Yes</option><option value="No">No</option>
              </select>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <CustomerSelect customers={customers} selectedCustomer={selectedCustomer} onSelect={handleCustomerSelect} onAddCustomer={onAddCustomer} />
            <div><label className="block text-xs font-medium mb-1">Project Name *</label><input type="text" value={formData.projectName} onChange={(e) => setFormData({ ...formData, projectName: e.target.value })} className="w-full border rounded px-3 py-2 text-sm" placeholder="Enter project name" /></div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div><label className="block text-xs font-medium mb-1">Attention</label><input type="text" value={formData.customerSnapshot?.contactName || ''} onChange={(e) => setFormData({ ...formData, customerSnapshot: { ...formData.customerSnapshot, contactName: e.target.value } })} className="w-full border rounded px-3 py-2 text-sm" /></div>
            <div><label className="block text-xs font-medium mb-1">Project Address</label><input type="text" value={formData.projectAddress} onChange={(e) => setFormData({ ...formData, projectAddress: e.target.value })} className="w-full border rounded px-3 py-2 text-sm" /></div>
            <div><label className="block text-xs font-medium mb-1">Payment Terms</label>
              <select value={formData.paymentTerms} onChange={(e) => setFormData({ ...formData, paymentTerms: e.target.value })} className="w-full border rounded px-3 py-2 text-sm">
                <option>Net 30</option><option>Net 15</option><option>Net 45</option><option>COD</option><option>Due on Receipt</option>
              </select>
            </div>
          </div>

          <div className="mb-4">
            <div className="flex justify-between items-center mb-2">
              <h3 className="font-semibold text-tc-blue">Line Items</h3>
              <button onClick={addLineItem} className="flex items-center gap-1 text-tc-orange hover:text-orange-600 text-sm"><Icons.Plus /> Add Item</button>
            </div>
            <div className="overflow-x-auto border rounded-lg">
              <table className="w-full text-sm">
                <thead className="bg-tc-blue text-white">
                  <tr><th className="py-2 px-2 w-10">#</th><th className="py-2 px-2 text-left w-44">Source/Material</th><th className="py-2 px-2 text-left">Description</th><th className="py-2 px-2 w-28">Qty</th><th className="py-2 px-2 w-20">Unit</th><th className="py-2 px-2 w-24">$/Unit</th><th className="py-2 px-2 w-28">Total</th><th className="py-2 px-2 w-10"></th></tr>
                </thead>
                <tbody>
                  {formData.lineItems.map((item, idx) => <LineItemRow key={idx} item={item} index={idx} materials={materials} sources={sources} onUpdate={updateLineItem} onRemove={removeLineItem} canBundle={idx > 0} />)}
                  {formData.lineItems.length === 0 && <tr><td colSpan="8" className="py-6 text-center text-gray-400">No items. Click "Add Item" to begin.</td></tr>}
                </tbody>
                <tfoot className="bg-gray-100 font-semibold"><tr><td colSpan="6" className="py-2 px-2 text-right">Subtotal:</td><td className="py-2 px-2 text-right text-lg text-tc-blue">{formatCurrency(subtotal)}</td><td></td></tr></tfoot>
              </table>
            </div>
          </div>

          <div className="mb-4"><label className="block text-xs font-medium mb-1">Scope of Work</label><textarea value={formData.scopeOfWork} onChange={(e) => setFormData({ ...formData, scopeOfWork: e.target.value })} className="w-full border rounded px-3 py-2 text-sm h-20" placeholder="Enter scope details..." /></div>

          <div className="flex justify-between pt-4 border-t">
            <button onClick={onCancel} className="px-4 py-2 border rounded hover:bg-gray-50 text-sm">Cancel</button>
            <div className="flex gap-2">
              <button onClick={() => handleSave(false)} className="flex items-center gap-1 px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 text-sm"><Icons.Save /> Save Draft</button>
              <button onClick={() => handleSave(true)} className="flex items-center gap-1 px-4 py-2 bg-tc-orange text-white rounded hover:bg-orange-600 text-sm"><Icons.Send /> Save & Send</button>
            </div>
          </div>

          {showPreview && <QuotePreview quote={{ ...formData, subtotal }} onClose={() => setShowPreview(false)} onSign={(sigData) => setFormData({ ...formData, ...sigData })} onSend={(sigData) => { setFormData({ ...formData, ...sigData }); handleSave(true); }} />}
        </div>
      );
    };

    // ============================================
    // QUOTE LOG
    // ============================================
    const QuoteLog = ({ quotes, onEdit, onRevise, onNew }) => {
      const [search, setSearch] = useState('');
      const [previewQuote, setPreviewQuote] = useState(null);

      const filtered = quotes.filter(q => 
        q.quoteNumber.toLowerCase().includes(search.toLowerCase()) || 
        q.projectName.toLowerCase().includes(search.toLowerCase()) || 
        q.customerSnapshot?.companyName?.toLowerCase().includes(search.toLowerCase())
      ).sort((a, b) => new Date(b.createdAt || b.bidDate) - new Date(a.createdAt || a.bidDate));

      const statusBadge = (s) => {
        const styles = { draft: 'bg-gray-100 text-gray-700', sent: 'bg-blue-100 text-blue-700', accepted: 'bg-green-100 text-green-700' };
        return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${styles[s] || styles.draft}`}>{s}</span>;
      };

      return (
        <div className="bg-white rounded-lg shadow">
          <div className="p-4 border-b flex flex-wrap gap-3 items-center">
            <div className="flex-1 min-w-64 relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></span>
              <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search quotes..." className="w-full pl-10 pr-4 py-2 border rounded-lg text-sm" />
            </div>
            <button onClick={onNew} className="flex items-center gap-1 px-4 py-2 bg-tc-orange text-white rounded-lg hover:bg-orange-600 text-sm"><Icons.Plus /> New Quote</button>
          </div>
          {filtered.length === 0 ? (
            <div className="p-8 text-center text-gray-500">No quotes found. Create your first quote!</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-tc-blue text-white">
                  <tr><th className="py-2 px-3 text-left">Quote #</th><th className="py-2 px-3 text-left">Customer</th><th className="py-2 px-3 text-left">Project</th><th className="py-2 px-3 text-right">Amount</th><th className="py-2 px-3 text-center">Status</th><th className="py-2 px-3 text-left">Date</th><th className="py-2 px-3 text-center">Actions</th></tr>
                </thead>
                <tbody>
                  {filtered.map(q => (
                    <tr key={q._id} className="border-b hover:bg-gray-50 cursor-pointer" onClick={() => setPreviewQuote(q)}>
                      <td className="py-2 px-3 font-medium">{q.quoteNumber}{q.revisionNumber > 0 && <span className="text-tc-orange">(R{q.revisionNumber})</span>}</td>
                      <td className="py-2 px-3">{q.customerSnapshot?.shortName}</td>
                      <td className="py-2 px-3">{q.projectName}</td>
                      <td className="py-2 px-3 text-right font-medium">{formatCurrency(q.subtotal)}</td>
                      <td className="py-2 px-3 text-center">{statusBadge(q.status)}</td>
                      <td className="py-2 px-3 text-xs">{formatDate(q.bidDate)}</td>
                      <td className="py-2 px-3 text-center" onClick={(e) => e.stopPropagation()}>
                        <button onClick={() => setPreviewQuote(q)} className="p-1 text-gray-500 hover:text-blue-600"><Icons.Eye /></button>
                        <button onClick={() => onEdit(q)} className="p-1 text-gray-500 hover:text-green-600"><Icons.Edit /></button>
                        <button onClick={() => onRevise(q)} className="p-1 text-gray-500 hover:text-tc-orange"><Icons.Copy /></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <div className="p-3 border-t bg-gray-50 grid grid-cols-4 gap-3 text-center text-xs">
            <div><p className="text-gray-500">Total</p><p className="text-lg font-bold text-tc-blue">{quotes.length}</p></div>
            <div><p className="text-gray-500">Drafts</p><p className="text-lg font-bold text-gray-600">{quotes.filter(q => q.status === 'draft').length}</p></div>
            <div><p className="text-gray-500">Sent</p><p className="text-lg font-bold text-blue-600">{quotes.filter(q => q.status === 'sent').length}</p></div>
            <div><p className="text-gray-500">Value</p><p className="text-lg font-bold text-tc-orange">{formatCurrency(quotes.reduce((s, q) => s + (q.subtotal || 0), 0))}</p></div>
          </div>
          {previewQuote && <QuotePreview quote={previewQuote} onClose={() => setPreviewQuote(null)} />}
        </div>
      );
    };

    // ============================================
    // CUSTOMERS PAGE
    // ============================================
    const CustomersPage = ({ customers, onUpdate }) => {
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});

      const startEdit = (c) => { setEditingId(c._id); setEditForm({ ...c, contactName: c.contacts[0]?.name || '', contactPhone: c.contacts[0]?.phone || '', contactEmail: c.contacts[0]?.email || '' }); };
      const saveEdit = () => {
        onUpdate({ ...editForm, contacts: [{ name: editForm.contactName, phone: editForm.contactPhone, email: editForm.contactEmail, isPrimary: true }] });
        setEditingId(null);
      };

      return (
        <div className="bg-white rounded-lg shadow">
          <div className="p-4 border-b"><h3 className="font-semibold text-tc-blue">Customer Database ({customers.length})</h3></div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-tc-blue text-white">
                <tr><th className="py-2 px-3 text-left">Short</th><th className="py-2 px-3 text-left">Company</th><th className="py-2 px-3 text-left">Address</th><th className="py-2 px-3 text-left">Contact</th><th className="py-2 px-3 text-left">Phone</th><th className="py-2 px-3 text-left">Email</th><th className="py-2 px-3 w-20">Actions</th></tr>
              </thead>
              <tbody>
                {customers.map(c => (
                  <tr key={c._id} className="border-b hover:bg-gray-50">
                    {editingId === c._id ? (
                      <>
                        <td className="py-2 px-3"><input type="text" value={editForm.shortName} onChange={(e) => setEditForm({ ...editForm, shortName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.companyName} onChange={(e) => setEditForm({ ...editForm, companyName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.address || ''} onChange={(e) => setEditForm({ ...editForm, address: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.contactName} onChange={(e) => setEditForm({ ...editForm, contactName: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.contactPhone} onChange={(e) => setEditForm({ ...editForm, contactPhone: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3"><input type="text" value={editForm.contactEmail} onChange={(e) => setEditForm({ ...editForm, contactEmail: e.target.value })} className="w-full border rounded px-2 py-1 text-sm" /></td>
                        <td className="py-2 px-3 text-center">
                          <button onClick={saveEdit} className="p-1 text-green-600"><Icons.Check /></button>
                          <button onClick={() => setEditingId(null)} className="p-1 text-red-500"><Icons.X /></button>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="py-2 px-3 font-medium">{c.shortName}</td>
                        <td className="py-2 px-3">{c.companyName}</td>
                        <td className="py-2 px-3 text-xs text-gray-600">{c.address}</td>
                        <td className="py-2 px-3">{c.contacts[0]?.name}</td>
                        <td className="py-2 px-3 text-xs">{c.contacts[0]?.phone}</td>
                        <td className="py-2 px-3 text-xs">{c.contacts[0]?.email}</td>
                        <td className="py-2 px-3 text-center"><button onClick={() => startEdit(c)} className="p-1 text-tc-orange hover:text-orange-600"><Icons.Edit /></button></td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    const App = () => {
      const [data, setData] = useState(getInitialData);
      const [user, setUser] = useState(null);
      const [page, setPage] = useState('quotes');
      const [showForm, setShowForm] = useState(false);
      const [editQuote, setEditQuote] = useState(null);
      const [showCalc, setShowCalc] = useState(false);
      const [calcRate, setCalcRate] = useState(null);
      const [sidebar, setSidebar] = useState(window.innerWidth > 768);
      const [login, setLogin] = useState({ username: '', password: '' });

      useEffect(() => { saveToStorage(data); }, [data]);

      const handleLogin = (e) => { e.preventDefault(); setUser(data.users.find(u => u.username === login.username) || data.users[0]); };
      
      const addCustomer = (c) => setData({ ...data, customers: [...data.customers, c] });
      const updateCustomer = (c) => setData({ ...data, customers: data.customers.map(x => x._id === c._id ? c : x) });
      const updateSource = (s) => setData({ ...data, sourceLocations: data.sourceLocations.map(x => x._id === s._id ? s : x) });
      const addSource = (s) => setData({ ...data, sourceLocations: [...data.sourceLocations, s] });
      const updateMaterial = (m) => setData({ ...data, materials: data.materials.map(x => x._id === m._id ? m : x) });
      const addMaterial = (m) => setData({ ...data, materials: [...data.materials, m] });

      const saveQuote = async (q, send) => {
        const isNew = !editQuote?._id;
        let finalQuote = { ...q };
        if (isNew) {
          try {
            const response = await fetch('https://texasgotrocks.com/.netlify/functions/tcq-log-quote', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                salesRepSnapshot: q.salesRepSnapshot,
                customerSnapshot: q.customerSnapshot,
                projectName: q.projectName,
                lineItems: q.lineItems,
                deliveryMethod: q.deliveryMethod,
                paymentTerms: q.paymentTerms,
                quoteData: q
              })
            });
            const res = await response.json();
            if (res && res.quoteNumber) {
              finalQuote = { ...finalQuote, quoteNumber: res.quoteNumber };
            }
          } catch (e) {
            console.error('Failed to log quote to server:', e);
          }
        }
        if (isNew) {
          setData({ ...data, quotes: [{ ...finalQuote, _id: Date.now().toString(), createdAt: new Date().toISOString() }, ...data.quotes] });
        } else {
          setData({ ...data, quotes: data.quotes.map(x => x._id === editQuote._id ? { ...x, ...finalQuote, updatedAt: new Date().toISOString() } : x) });
        }
        setShowForm(false); setEditQuote(null); setCalcRate(null);
        if (send) alert('Quote saved! Email integration requires Brevo setup.');
      };

      const revise = (q) => { setEditQuote({ ...q, _id: null, revisionNumber: (q.revisionNumber || 0) + 1, status: 'draft', previousVersionId: q._id }); setShowForm(true); };

      if (!user) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-tc-blue to-blue-800 flex items-center justify-center p-4">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-8">
              <div className="text-center mb-6">
                <img src="/apple-touch-icon.png" alt="T&C Ez Quote" className="w-20 h-20 rounded-xl mx-auto mb-3 shadow-lg" />
                <h1 className="text-2xl font-bold">T&C Ez Quote</h1>
                <p className="text-gray-500 text-sm">T&C Materials, LLC</p>
              </div>
              <form onSubmit={handleLogin} className="space-y-4">
                <input type="text" value={login.username} onChange={(e) => setLogin({ ...login, username: e.target.value })} placeholder="Username" className="w-full border rounded-lg px-4 py-3" />
                <input type="password" value={login.password} onChange={(e) => setLogin({ ...login, password: e.target.value })} placeholder="Password" className="w-full border rounded-lg px-4 py-3" />
                <button type="submit" className="w-full bg-tc-orange text-white py-3 rounded-lg font-medium hover:bg-orange-600">Sign In</button>
              </form>
              <p className="mt-4 text-center text-xs text-gray-500">Users: alex.saplala, corey.pelletier</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-100 flex">
          <aside className={`${sidebar ? 'w-56' : 'w-14 mobile-hidden'} bg-tc-blue text-white transition-all flex flex-col`}>
            <div className="p-3 border-b border-blue-800 flex items-center gap-2">
              <div className="w-8 h-8 bg-tc-orange rounded flex items-center justify-center flex-shrink-0"><Icons.Building /></div>
              {sidebar && <div><h1 className="font-bold text-sm">T&C Ez Quote</h1></div>}
            </div>
            <nav className="flex-1 p-2 space-y-1">
              <button onClick={() => { setPage('quotes'); setShowForm(false); }} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'quotes' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.FileText />{sidebar && 'Quote Log'}</button>
              <button onClick={() => setPage('customers')} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'customers' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.Users />{sidebar && 'Customers'}</button>
              <button onClick={() => setPage('pricing')} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'pricing' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.Package />{sidebar && 'Pricing'}</button>
              <button onClick={() => setPage('sources')} className={`w-full flex items-center gap-2 px-3 py-2 rounded text-sm ${page === 'sources' ? 'bg-blue-800' : 'hover:bg-blue-800'}`}><Icons.MapPin />{sidebar && 'Sources'}</button>
            </nav>
            <div className="p-2 border-t border-blue-800">
              {sidebar && <p className="text-xs mb-2 px-2">{user.name}</p>}
              <button onClick={() => setUser(null)} className="w-full flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-blue-800"><Icons.LogOut />{sidebar && 'Logout'}</button>
            </div>
          </aside>

          <main className="flex-1 flex flex-col">
            <header className="bg-white shadow-sm px-4 py-3 flex items-center gap-3">
              <button onClick={() => setSidebar(!sidebar)} className="p-1.5 hover:bg-gray-100 rounded"><Icons.Menu /></button>
              <h2 className="text-lg font-semibold text-tc-blue capitalize">{page === 'quotes' && !showForm ? 'Quote Log' : page === 'sources' ? 'Source Locations' : page}</h2>
            </header>
            <div className="flex-1 p-4 overflow-auto">
              {page === 'quotes' && !showForm && <QuoteLog quotes={data.quotes} onEdit={(q) => { setEditQuote(q); setShowForm(true); }} onRevise={revise} onNew={() => { setEditQuote(null); setShowForm(true); }} />}
              {page === 'quotes' && showForm && <QuoteForm quote={editQuote} customers={data.customers} materials={data.materials} sources={data.sourceLocations} currentUser={user} onSave={saveQuote} onCancel={() => { setShowForm(false); setEditQuote(null); setCalcRate(null); }} onShowCalc={() => setShowCalc(true)} onAddCustomer={addCustomer} calcRate={calcRate} />}
              {page === 'customers' && <CustomersPage customers={data.customers} onUpdate={updateCustomer} />}
              {page === 'pricing' && <PricingMatrixManager materials={data.materials} sources={data.sourceLocations} onUpdateMaterial={updateMaterial} onAddMaterial={addMaterial} />}
              {page === 'sources' && <SourceLocationsManager sources={data.sourceLocations} onUpdate={updateSource} onAdd={addSource} />}
            </div>
          </main>

          <TruckRateCalculator isOpen={showCalc} onClose={() => setShowCalc(false)} onApply={(d) => setCalcRate(d)} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
